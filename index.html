<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lamoniê Flow - Premium</title>
    <style>
        :root { 
            --bg: #000; 
            --apple-red: #ff2d55;
            --glass: rgba(28, 28, 30, 0.95);
            --glass-border: rgba(255, 255, 255, 0.1);
            --yellow: #FFD700;
        }
        
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; overflow: hidden; width: 100vw; height: 100vh; }

        /* NAVEGAÇÃO POR ABAS */
        .tab-content { display: none; height: 100vh; overflow-y: auto; padding-bottom: 200px; }
        .tab-content.active { display: block; }

        /* TOPO FIXO */
        .header-fixed-top { position: sticky; top: 0; z-index: 1000; background: var(--bg); padding-bottom: 10px; }
        header { padding: 40px 20px 10px; font-size: 34px; font-weight: 800; }

        /* CARROSSEL E GRIDS */
        .section-container { margin-bottom: 25px; width: 100%; }
        .section-title { padding: 0 20px 10px; font-size: 22px; font-weight: 700; }
        .horizontal-scroll { display: flex; overflow-x: auto; gap: 15px; padding: 0 20px; scrollbar-width: none; }
        .horizontal-scroll::-webkit-scrollbar { display: none; }

        /* CAPAS ESTILO PREMIUM */
        .card { width: 165px; min-width: 165px; background: #1c1c1e; border-radius: 18px; overflow: hidden; border: 0.5px solid #333; position: relative; }
        .card-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }
        .card-info { padding: 12px; font-size: 14px; font-weight: 600; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .fav-btn { position: absolute; top: 10px; right: 10px; width: 35px; height: 35px; background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10; }
        .fav-btn svg { width: 20px; fill: #fff; }
        .fav-btn.active svg { fill: var(--yellow); }

        /* PLAYER TELA CHEIA */
        #player-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1500; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .player-art { width: 85%; max-width: 350px; aspect-ratio: 1/1; border-radius: 30px; object-fit: cover; box-shadow: 0 20px 50px rgba(0,0,0,0.8); margin-bottom: 40px; }

        /* AS DUAS BARRAS (SÓ NA HOME) */
        .mini-player {
            position: fixed; bottom: 125px; left: 50%; transform: translateX(-50%);
            width: 92%; height: 64px; background: var(--glass); backdrop-filter: blur(25px);
            border-radius: 16px; border: 1px solid var(--glass-border);
            display: none; align-items: center; padding: 0 15px; z-index: 1900;
        }
        .mini-art { width: 48px; height: 48px; border-radius: 10px; object-fit: cover; margin-right: 15px; }

        .apple-dock { 
            position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); 
            width: 92%; height: 85px; z-index: 2000; 
            background: var(--glass); backdrop-filter: blur(30px); 
            border-radius: 40px; border: 1px solid var(--glass-border); 
            display: flex; align-items: center; justify-content: space-around; 
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #8e8e93; position: relative; }
        .nav-item.active { color: var(--apple-red); }
        .nav-item svg { width: 28px; height: 28px; margin-bottom: 5px; fill: currentColor; }
        .nav-item span { font-size: 11px; font-weight: 700; }
        
        /* CONTADOR AMARELO NA BIBLIOTECA */
        .badge-count { position: absolute; top: -5px; right: -8px; background: var(--yellow); color: #000; font-size: 11px; font-weight: 900; padding: 2px 6px; border-radius: 10px; min-width: 18px; text-align: center; }

        .dock-play-btn { width: 65px; height: 65px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="home" class="tab-content active">
        <div class="header-fixed-top">
            <header>Rádios</header>
            <div id="top-carousel-area"></div>
        </div>
        <div id="bottom-carousels"></div>
    </div>

    <div id="lib" class="tab-content">
        <header>Biblioteca</header>
        <div id="favorites-grid" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; padding: 20px; justify-items: center;"></div>
    </div>

    <div id="search" class="tab-content">
        <header>Busca</header>
        <div style="padding: 20px;"><input type="text" placeholder="Procurar estações..." style="width: 100%; padding: 15px; border-radius: 12px; border: none; background: #1c1c1e; color: #fff;"></div>
    </div>

    <div id="mini-player" class="mini-player" onclick="showPlayer()">
        <img id="m-art" class="mini-art" src="">
        <div style="flex:1;"><h4 id="m-name" style="font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Tocando agora...</h4></div>
        <div onclick="event.stopPropagation(); togglePlay();"><svg viewBox="0 0 24 24" width="35"><path id="mini-play-icon" fill="white" d="M8 5v14l11-7z"/></svg></div>
    </div>

    <div id="player-view">
        <div onclick="hidePlayer()" style="position:absolute; top:50px; left:25px;"><svg viewBox="0 0 24 24" width="30" fill="white"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg></div>
        <img id="p-art" class="player-art" src="">
        <h2 id="p-name" style="font-size: 26px;">Nome da Rádio</h2>
        <p id="p-loc" style="color: #8e8e93; margin-top: 10px;">Localização</p>
    </div>

    <div class="apple-dock">
        <div class="nav-item active" onclick="switchTab('home', this)">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>INÍCIO</span>
        </div>
        <div class="nav-item" onclick="switchTab('lib', this)">
            <div id="fav-count" class="badge-count">0</div>
            <svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
            <span>BIBLIOTECA</span>
        </div>
        <div class="dock-play-btn" onclick="togglePlay()">
            <svg viewBox="0 0 24 24" width="36"><path id="dock-play-icon" fill="white" d="M8 5v14l11-7z"/></svg>
        </div>
        <div class="nav-item" onclick="switchTab('search', this)">
            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <span>BUSCA</span>
        </div>
    </div>

    <audio id="player-engine"></audio>

    <script>
        const audio = document.getElementById('player-engine');
        let favorites = JSON.parse(localStorage.getItem('lamonie_favs')) || [];
        let currentStation = null;

        async function init() {
            updateFavCount();
            try {
                const res = await fetch('https://de1.api.radio-browser.info/json/stations/search?limit=150&countrycode=BR&hidebroken=true&order=clickcount&reverse=true');
                const data = await res.json();
                
                // Topo: Todo o catálogo (Prioridade Forró)
                renderCarousel("Prioridade Forró & Trapiá", data.slice(0, 30), document.getElementById('top-carousel-area'));
                
                // Outras fileiras
                const bottom = document.getElementById('bottom-carousels');
                const categories = ["Sucessos Brasil", "Sertanejo", "Pop & Rock", "Notícias"];
                categories.forEach((cat, i) => {
                    renderCarousel(cat, data.slice((i+1)*20, (i+1)*20 + 15), bottom);
                });
                
                renderFavorites();
            } catch(e) { console.error("Erro ao carregar", e); }
        }

        function renderCarousel(title, list, container) {
            const sec = document.createElement('div');
            sec.className = 'section-container';
            sec.innerHTML = `<div class="section-title">${title}</div><div class="horizontal-scroll"></div>`;
            const scroll = sec.querySelector('.horizontal-scroll');
            list.forEach(item => scroll.appendChild(createCard(item)));
            container.appendChild(sec);
        }

        function createCard(item) {
            const el = document.createElement('div');
            el.className = 'card';
            el.onclick = () => playStation(item);
            const isFav = favorites.some(f => f.stationuuid === item.stationuuid);
            el.innerHTML = `
                <div class="fav-btn ${isFav ? 'active' : ''}" onclick="event.stopPropagation(); toggleFav('${item.stationuuid}', this)">
                    <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                </div>
                <img class="card-img" src="${item.favicon || 'https://via.placeholder.com/165/333/fff?text=Radio'}">
                <div class="card-info">${item.name}</div>
            `;
            return el;
        }

        function playStation(item) {
            currentStation = item;
            document.getElementById('p-art').src = item.favicon || 'https://via.placeholder.com/350/333/fff?text=Radio';
            document.getElementById('p-name').innerText = item.name;
            document.getElementById('p-loc').innerText = item.state || "Brasil";
            
            document.getElementById('m-art').src = item.favicon || 'https://via.placeholder.com/50/333/fff?text=R';
            document.getElementById('m-name').innerText = item.name;
            
            document.getElementById('mini-player').style.display = 'flex';
            showPlayer();

            if(audio.src !== item.url_resolved) {
                audio.src = item.url_resolved;
                audio.play();
                updateIcons(true);
            }
        }

        function togglePlay() {
            if(audio.paused) { audio.play(); updateIcons(true); }
            else { audio.pause(); updateIcons(false); }
        }

        function updateIcons(playing) {
            const path = playing ? "M6 19h4V5H6v14zm8-14v14h4V5h-4z" : "M8 5v14l11-7z";
            document.getElementById('dock-play-icon').setAttribute('d', path);
            document.getElementById('mini-play-icon').setAttribute('d', path);
        }

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            hidePlayer();
        }

        function showPlayer() { document.getElementById('player-view').style.display = 'flex'; }
        function hidePlayer() { document.getElementById('player-view').style.display = 'none'; }

        function toggleFav(id, btn) {
            // Lógica de favoritos aqui (adicionar/remover do array e localStorage)
            updateFavCount();
            renderFavorites();
        }

        function updateFavCount() { document.getElementById('fav-count').innerText = favorites.length; }

        init();
    </script>
</body>
</html>
