<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIE MUSIC - FIX FINAL</title>
    <style>
        :root {
            --orange: #ff8c00;
            --ios-red: #ff3b30;
            --glass: rgba(25, 25, 25, 0.85);
            --border: 0.5px solid var(--orange);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: white; font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh; }

        /* HEADER */
        header { padding: 50px 20px 10px; background: #000; }
        header h1 { font-size: 34px; font-weight: 800; color: var(--orange); }

        /* GRADE 3 COLUNAS - ROLAGEM LISA */
        #main-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 15px;
            height: calc(100vh - 250px);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .radio-box {
            aspect-ratio: 1/1;
            background: #1c1c1e;
            border-radius: 12px;
            overflow: hidden;
            border: 0.5px solid #333;
            cursor: pointer;
        }
        .radio-box img { width: 100%; height: 100%; object-fit: cover; }

        /* PLAYER DE VIDRO (FIXED) */
        #player-dock {
            position: fixed; bottom: 105px; left: 15px; right: 15px;
            height: 75px; background: var(--glass); backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px); border-radius: 20px;
            display: none; align-items: center; justify-content: space-between;
            padding: 0 15px; border: var(--border); z-index: 2000;
        }

        .info-play { display: flex; align-items: center; gap: 10px; max-width: 60%; }
        .art-play { width: 50px; height: 50px; border-radius: 8px; background: #333; object-fit: cover; }
        .text-play { overflow: hidden; }
        .track-n { font-size: 14px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .controls { display: flex; gap: 15px; }
        .btn-cmd { background: none; border: none; color: white; font-size: 26px; cursor: pointer; }

        /* TAB BAR - BOTÕES CÁPSULA */
        .tab-bar {
            position: fixed; bottom: 25px; left: 15px; right: 80px;
            display: flex; gap: 8px; height: 55px; z-index: 1000;
        }

        .tab-btn {
            flex: 1; background: var(--glass); backdrop-filter: blur(20px);
            border-radius: 25px; display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 600; border: var(--border); color: #fff;
        }
        .active-lib { border-color: var(--ios-red); color: var(--ios-red); background: rgba(255,59,48,0.1); }

        .search-circle {
            position: fixed; bottom: 25px; right: 15px;
            width: 55px; height: 55px; background: #1c1c1e;
            border-radius: 50%; border: var(--border);
            display: flex; align-items: center; justify-content: center; font-size: 20px; z-index: 1000;
        }
    </style>
</head>
<body>

    <header><h1>Rádio</h1></header>

    <div id="main-grid"></div>

    <div id="player-dock">
        <div class="info-play">
            <img id="p-art" class="art-play" src="">
            <div class="text-play">
                <div id="p-name" class="track-n">Selecionado</div>
                <div style="font-size: 11px; color: var(--orange);">Ao Vivo</div>
            </div>
        </div>
        <div class="controls">
            <button class="btn-cmd" onclick="engine.toggle()" id="play-icon">⏸️</button>
            <button class="btn-cmd">⏩</button>
        </div>
    </div>

    <nav class="tab-bar">
        <div class="tab-btn">Início</div>
        <div class="tab-btn">Rádio</div>
        <div class="tab-btn active-lib">Biblioteca</div>
    </nav>
    <div class="search-circle">🔍</div>

    <audio id="main-audio" crossorigin="anonymous"></audio>

    <script>
        const engine = {
            init: async () => {
                try {
                    const res = await fetch('https://de1.api.radio-browser.info/json/stations/search?country=Brazil&limit=99&hidebroken=true&order=clickcount&reverse=true');
                    const data = await res.json();
                    const grid = document.getElementById('main-grid');
                    data.forEach(r => {
                        const box = document.createElement('div');
                        box.className = 'radio-box';
                        box.onclick = () => engine.play(r);
                        box.innerHTML = `<img src="${r.favicon || 'https://via.placeholder.com/150/1c1c1e/white?text=RADIO'}">`;
                        grid.appendChild(box);
                    });
                } catch(e) { alert("Erro ao carregar rádios. Verifique a internet."); }
            },
            play: (r) => {
                const aud = document.getElementById('main-audio');
                const dock = document.getElementById('player-dock');
                const btn = document.getElementById('play-icon');
                
                aud.src = r.url_resolved;
                aud.play().catch(err => {
                    console.log("Erro de autoplay, tentando novamente...");
                    aud.play();
                });

                document.getElementById('p-art').src = r.favicon || '';
                document.getElementById('p-name').innerText = r.name;
                btn.innerText = "⏸️";
                dock.style.display = 'flex';
            },
            toggle: () => {
                const aud = document.getElementById('main-audio');
                const btn = document.getElementById('play-icon');
                if (aud.paused) {
                    aud.play();
                    btn.innerText = "⏸️";
                } else {
                    aud.pause();
                    btn.innerText = "▶️";
                }
            }
        };
        engine.init();
    </script>
</body>
</html>
