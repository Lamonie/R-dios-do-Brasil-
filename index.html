<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ FLASH</title>
    <style>
        :root { 
            --bg: #000; 
            --apple-red: #ff2d55;
            --glass: rgba(28, 28, 30, 0.85);
            --glass-border: rgba(255, 255, 255, 0.1);
            --yellow: #FFD700;
            --neon-glow: 0 0 10px rgba(255, 45, 85, 0.8), 0 0 20px rgba(255, 45, 85, 0.3);
        }
        
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; overflow-x: hidden; width: 100vw; }

        /* EFEITO AFTER EFFECTS LAMONIÊ FLASH */
        header { 
            padding: 50px 20px 20px; 
            font-size: 36px; 
            font-weight: 900; 
            text-align: center;
            background: var(--bg); 
            position: sticky; 
            top: 0; 
            z-index: 100;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: var(--neon-glow);
            animation: glitch 3s infinite linear alternate-reverse;
        }

        @keyframes glitch {
            0% { text-shadow: 2px 2px #ff2d55, -2px -2px #00fff9; transform: skew(0deg); }
            2% { text-shadow: -3px 0px #ff2d55, 3px 0px #00fff9; transform: skew(2deg); }
            4% { text-shadow: 2px 0px #ff2d55, -2px 0px #00fff9; transform: skew(-2deg); }
            100% { text-shadow: 1px 1px #ff2d55, -1px -1px #00fff9; }
        }

        .search-container { padding: 10px 20px; position: sticky; top: 110px; z-index: 101; background: var(--bg); }
        .search-input { 
            width: 100%; padding: 12px 15px; border-radius: 12px; border: 1px solid var(--glass-border); 
            background: #1c1c1e; color: white; font-size: 16px; outline: none;
        }

        .skeleton { background: #1c1c1e; position: relative; overflow: hidden; }
        .skeleton::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            animation: loading 1.2s infinite;
        }
        @keyframes loading { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        .section-container { margin-bottom: 25px; width: 100%; }
        .section-title { padding: 0 20px 10px; font-size: 18px; font-weight: 700; color: #fff; }
        
        .horizontal-scroll { 
            display: flex; overflow-x: auto; gap: 15px; padding: 0 20px 10px; 
            scrollbar-width: none; scroll-behavior: smooth;
        }
        .horizontal-scroll::-webkit-scrollbar { display: none; }

        .explore-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            padding: 0 20px 120px;
        }

        .card { 
            background: #1c1c1e; border-radius: 14px; overflow: hidden; 
            border: 0.5px solid #333; position: relative; transition: transform 0.2s;
        }
        .card:active { transform: scale(0.95); }
        .card-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; background: #2c2c2e; opacity: 0; transition: opacity 0.3s; }
        .card-img.loaded { opacity: 1; }
        .card-info { padding: 10px 8px; font-size: 12px; font-weight: 600; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .fav-btn {
            position: absolute; top: 6px; right: 6px; width: 30px; height: 30px;
            background: rgba(0,0,0,0.6); border-radius: 50%; display: flex;
            align-items: center; justify-content: center; z-index: 10;
        }
        .fav-btn.active svg { fill: var(--yellow); }
        .fav-btn svg { width: 18px; fill: #666; }

        .apple-dock { position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 400px; height: 75px; z-index: 1000; background: var(--glass); backdrop-filter: blur(30px) saturate(180%); -webkit-backdrop-filter: blur(30px) saturate(180%); border-radius: 38px; border: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: space-around; }
        .nav-item { display: flex; flex-direction: column; align-items: center; flex: 1; color: #8e8e93; }
        .nav-item.active { color: var(--apple-red); }
        .nav-item.active svg { fill: var(--apple-red); }
        .nav-item svg { width: 24px; height: 24px; fill: #8e8e93; }
        
        .dock-play-btn { width: 60px; height: 60px; background: #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; border: 2px solid var(--apple-red); }
        #dock-thumb { position: absolute; width: 100%; height: 100%; border-radius: 50%; object-fit: cover; opacity: 0.5; }

        #player-view { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
        .player-art { width: 280px; height: 280px; border-radius: 20px; box-shadow: 0 20px 40px rgba(255,45,85,0.3); margin-bottom: 30px; }
        
        #loading-trigger { padding: 40px; text-align: center; color: var(--apple-red); font-weight: bold; }
    </style>
</head>
<body>

    <header id="page-title">LAMONIÊ FLASH</header>

    <div id="main-content">
        <div id="search-bar-area" class="search-container" style="display: none;">
            <input type="text" id="input-busca" class="search-input" placeholder="O que você quer ouvir?" oninput="debounceSearch()">
        </div>

        <div id="home-content">
            <div id="carousels-area"></div>
            <div class="section-title">Explorar Brasil</div>
            <div id="explore-grid" class="explore-grid"></div>
            <div id="loading-trigger">CARREGANDO RÁDIO TURBO...</div>
        </div>
    </div>

    <div id="player-view">
        <button onclick="closePlayer()" style="position:absolute; top:50px; left:30px; background:none; border:none; color:white; font-size:18px;">Fechar</button>
        <img id="p-art" class="player-art" src="">
        <h2 id="p-name">Nome da Rádio</h2>
        <p id="p-loc" style="color: #888; margin-top: 10px;">Localização</p>
        <div onclick="togglePlayback()" style="margin-top: 40px; transform: scale(2.5);">
             <svg id="play-icon-large" viewBox="0 0 24 24" width="30"><path fill="white" d="M8 5v14l11-7z"/></svg>
        </div>
    </div>

    <div class="apple-dock">
        <div class="nav-item active" onclick="changeTab('home', this)">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span style="font-size: 9px; font-weight: bold;">INÍCIO</span>
        </div>
        <div class="dock-play-btn" onclick="openPlayer()">
            <img id="dock-thumb" src="">
            <svg id="dock-play-svg" viewBox="0 0 24 24" width="28" style="z-index: 2;"><path fill="white" d="M8 5v14l11-7z"/></svg>
        </div>
        <div class="nav-item" onclick="changeTab('grid', this)">
            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <span style="font-size: 9px; font-weight: bold;">BUSCA</span>
        </div>
    </div>

    <audio id="audio-engine"></audio>

    <script>
        const audio = document.getElementById('audio-engine');
        const exploreGrid = document.getElementById('explore-grid');
        const loadingTrigger = document.getElementById('loading-trigger');
        let radioData = [];
        let offset = 0;
        let isFetching = false;
        let searchTimer;

        // Observer para carregar imagens apenas quando visíveis (Otimização de Velocidade)
        const imageObserver = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const img = entry.target;
                    img.src = img.dataset.src;
                    img.onload = () => img.classList.add('loaded');
                    observer.unobserve(img);
                }
            });
        });

        async function fetchRadios(reset = false) {
            if (isFetching) return;
            isFetching = true;
            if (reset) { offset = 0; exploreGrid.innerHTML = ''; }

            try {
                const response = await fetch(`https://de1.api.radio-browser.info/json/stations/search?country=Brazil&limit=40&offset=${offset}&order=clickcount&reverse=true&hidebroken=true`);
                const data = await response.json();
                
                if (data.length > 0) {
                    renderRadios(data);
                    offset += 40;
                } else {
                    loadingTrigger.innerText = "FIM DA LISTA";
                }
            } catch (e) {
                console.error("Erro ao carregar", e);
            } finally {
                isFetching = false;
            }
        }

        function renderRadios(list) {
            const frag = document.createDocumentFragment();
            list.forEach(radio => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => playRadio(radio);
                
                const art = radio.favicon || `https://ui-avatars.com/api/?name=${encodeURIComponent(radio.name)}&background=2c2c2e&color=fff`;
                
                card.innerHTML = `
                    <div class="fav-btn" onclick="event.stopPropagation(); this.classList.toggle('active')">
                        <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                    </div>
                    <img class="card-img skeleton" data-src="${art}">
                    <div class="card-info">${radio.name}</div>
                `;
                imageObserver.observe(card.querySelector('img'));
                frag.appendChild(card);
            });
            exploreGrid.appendChild(frag);
        }

        function playRadio(radio) {
            currentRadio = radio;
            audio.src = radio.url_resolved;
            audio.play();
            
            document.getElementById('p-art').src = radio.favicon || '';
            document.getElementById('p-name').innerText = radio.name;
            document.getElementById('p-loc').innerText = radio.state || 'Brasil';
            document.getElementById('dock-thumb').src = radio.favicon || '';
            document.getElementById('dock-thumb').style.opacity = '1';
            
            updateIcons(true);
            openPlayer();
        }

        function updateIcons(playing) {
            const path = playing ? "M6 19h4V5H6v14zm8-14v14h4V5h-4z" : "M8 5v14l11-7z";
            document.getElementById('dock-play-svg').querySelector('path').setAttribute('d', path);
            document.getElementById('play-icon-large').querySelector('path').setAttribute('d', path);
        }

        function togglePlayback() {
            if (audio.paused) { audio.play(); updateIcons(true); }
            else { audio.pause(); updateIcons(false); }
        }

        function changeTab(tab, btn) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            btn.classList.add('active');
            
            if (tab === 'grid') {
                document.getElementById('search-bar-area').style.display = 'block';
                document.getElementById('home-content').style.display = 'none';
            } else {
                document.getElementById('search-bar-area').style.display = 'none';
                document.getElementById('home-content').style.display = 'block';
            }
        }

        function debounceSearch() {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(async () => {
                const term = document.getElementById('input-busca').value;
                if (term.length < 3) return;
                
                exploreGrid.innerHTML = '<p style="padding:20px">Buscando...</p>';
                const res = await fetch(`https://de1.api.radio-browser.info/json/stations/byname/${encodeURIComponent(term)}?limit=30`);
                const data = await res.json();
                exploreGrid.innerHTML = '';
                renderRadios(data);
            }, 500);
        }

        function openPlayer() { document.getElementById('player-view').style.display = 'flex'; }
        function closePlayer() { document.getElementById('player-view').style.display = 'none'; }

        // Scroll infinito
        window.onscroll = () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) {
                fetchRadios();
            }
        };

        // Início
        fetchRadios();
    </script>
</body>
</html>
