<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lamoniê Flow - Crystal Edition</title>
    <style>
        :root { 
            --apple-red: #ff2d55; 
            /* Vidro mais transparente e brilhante */
            --crystal-bg: rgba(255, 255, 255, 0.15);
            --crystal-border: rgba(255, 255, 255, 0.4);
            --glow: 0 10px 30px rgba(0,0,0,0.5), inset 0 1px 4px rgba(255,255,255,0.3);
        }
        
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: #000; color: white; padding-bottom: 120px; overflow-x: hidden; }

        header { padding: 60px 20px 10px; font-size: 34px; font-weight: 800; letter-spacing: -1px; }

        /* GRID */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 20px; }
        .card { background: #1c1c1e; border-radius: 20px; overflow: hidden; position: relative; border: 0.5px solid #333; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }

        /* BARRA DE VIDRO UNIFICADA - CRYSTAL DESIGN */
        .unified-crystal-bar {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 500px; height: 75px; z-index: 10000;
            background: var(--crystal-bg);
            backdrop-filter: blur(25px) saturate(200%);
            -webkit-backdrop-filter: blur(25px) saturate(200%);
            border-radius: 35px;
            border: 1px solid var(--crystal-border);
            box-shadow: var(--glow);
            display: flex; align-items: center; justify-content: space-around;
            padding: 0 15px;
            transition: transform 0.4s ease, opacity 0.4s ease;
        }

        .unified-crystal-bar.hide { transform: translateX(-50%) translateY(120px); opacity: 0; }

        /* BOTÕES AVANÇADOS */
        .btn-adv {
            display: flex; flex-direction: column; align-items: center; 
            color: rgba(255,255,255,0.6); font-size: 11px; font-weight: 700; 
            cursor: pointer; transition: 0.2s; text-transform: uppercase;
        }
        .btn-adv.active { color: white; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        
        /* BOTÃO PLAY/PAUSE INTEGRADO */
        .play-pause-btn {
            background: rgba(255,255,255,0.1);
            width: 55px; height: 55px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--crystal-border);
            font-size: 22px; color: white;
            transition: 0.2s;
        }
        .play-pause-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.2); }

        #player-view {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9000; display: none; flex-direction: column; align-items: center; padding-top: 80px;
        }
    </style>
</head>
<body>

    <header id="header-text">Rádios</header>

    <div id="home-view">
        <div class="grid" id="main-grid"></div>
    </div>

    <div id="player-view">
        <img id="player-img" style="width: 85%; border-radius: 25px;">
        <h2 id="player-title" style="margin-top: 30px;"></h2>
    </div>

    <nav class="unified-crystal-bar" id="crystal-bar">
        <div class="btn-adv active" id="btn-home" onclick="changeTab('home')">
            Início
        </div>

        <div class="play-pause-btn" onclick="toggleAudio()" id="main-action">
            <span id="p-icon">▶️</span>
        </div>

        <div class="btn-adv" onclick="openSearch()">
            Buscar
        </div>
    </nav>

    <audio id="core-audio"></audio>

    <script>
        let dbRadios = [];
        let favorites = JSON.parse(localStorage.getItem('lamonie_v6')) || [];
        const audio = document.getElementById('core-audio');
        const bar = document.getElementById('crystal-bar');
        let lastPos = 0;

        // INTELIGÊNCIA ESCONDE-ESCONDE
        window.onscroll = () => {
            let currentPos = window.pageYOffset;
            if (currentPos > lastPos && currentPos > 100) {
                bar.classList.add('hide');
            } else {
                bar.classList.remove('hide');
            }
            lastPos = currentPos;
        };

        async function load() {
            const r = await fetch('https://de1.api.radio-browser.info/json/stations/search?country=Brazil&limit=60&hidebroken=true&order=clickcount&reverse=true');
            dbRadios = await r.json();
            show(dbRadios);
        }

        function show(list) {
            const g = document.getElementById('main-grid');
            g.innerHTML = '';
            list.forEach(r => {
                g.innerHTML += `<div class="card" onclick="playNow('${r.changeuuid}')"><img src="${r.favicon || 'https://via.placeholder.com/300/1c1c1e/white?text=RADIO'}"></div>`;
            });
        }

        function playNow(id) {
            const r = dbRadios.find(x => x.changeuuid === id) || favorites.find(x => x.changeuuid === id);
            audio.src = r.url_resolved;
            audio.play();
            document.getElementById('p-icon').innerText = '⏸️';
            document.getElementById('player-img').src = r.favicon;
            document.getElementById('player-title').innerText = r.name;
            document.getElementById('player-view').style.display = 'flex';
            
            if(!favorites.some(f => f.changeuuid === r.changeuuid)) {
                favorites.push(r);
                localStorage.setItem('lamonie_v6', JSON.stringify(favorites));
            }
        }

        function toggleAudio() {
            if(!audio.src) return;
            if(audio.paused) { audio.play(); document.getElementById('p-icon').innerText = '⏸️'; }
            else { audio.pause(); document.getElementById('p-icon').innerText = '▶️'; }
        }

        function changeTab(tab) {
            document.getElementById('player-view').style.display = 'none';
            document.getElementById('header-text').innerText = "Rádios";
            show(dbRadios);
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function openSearch() {
            let q = prompt("O que vamos ouvir, Fenômeno?");
            if(q) show(dbRadios.filter(x => x.name.toLowerCase().includes(q.toLowerCase())));
        }

        load();
    </script>
</body>
</html>
