<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lamonie Radio PRO - High Performance</title>
    <style>
        :root {
            --orange: #ff8c00;
            --blue-apple: #007AFF;
            --bg: #000000;
            --surface: #121212;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: -apple-system, system-ui, sans-serif; overflow-x: hidden; }

        /* UTILITÁRIOS */
        .border-thin { border: 0.5px solid var(--orange); }
        .hidden { display: none !important; }

        /* AUTH SCREEN */
        #auth-screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 30px; }
        .input-group { margin-bottom: 15px; }
        input { width: 100%; background: #1a1a1a; border: 0.5px solid var(--orange); padding: 15px; color: white; border-radius: 8px; outline: none; }
        .btn-main { background: var(--orange); color: black; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* HEADER */
        header { padding: 40px 20px 10px; position: sticky; top: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 100; }
        header h1 { font-size: 34px; font-weight: 700; }

        /* SEÇÕES E CARROSSEL */
        .section-header { display: flex; justify-content: space-between; padding: 20px 20px 10px; color: var(--blue-apple); font-weight: 600; font-size: 14px; text-transform: uppercase; }
        .carousel-wrapper { overflow-x: auto; display: flex; gap: 12px; padding: 0 20px 20px; scroll-snap-type: x mandatory; }
        .carousel-wrapper::-webkit-scrollbar { display: none; }
        
        .radio-card { min-width: 110px; scroll-snap-align: start; cursor: pointer; }
        .thumb { width: 110px; height: 110px; background: #1a1a1a; border-radius: 14px; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .radio-card span { font-size: 12px; display: block; text-align: center; color: #eee; }

        /* MODAL DE DETALHES (ABA) */
        #details-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: none; padding: 40px 20px; }
        .modal-body { background: #111; border: 0.5px solid var(--orange); border-radius: 24px; padding: 25px; height: 100%; display: flex; flex-direction: column; align-items: center; }
        .big-thumb { width: 200px; height: 200px; background: #222; border-radius: 20px; margin-bottom: 20px; }
        .desc-text { text-align: center; margin: 20px 0; color: #bbb; line-height: 1.5; }
        .location-tag { color: var(--blue-apple); font-weight: bold; margin-bottom: 10px; }

        .btn-row { display: flex; gap: 10px; width: 100%; margin-top: auto; }
        .btn-action { flex: 1; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; }
        .btn-back { background: var(--blue-apple); color: white; }
        .btn-memory { background: #333; color: white; border: 0.5px solid var(--orange); }

        /* TAB BAR */
        .tab-bar { position: fixed; bottom: 0; width: 100%; height: 85px; background: rgba(0,0,0,0.9); border-top: 0.5px solid #222; display: flex; justify-content: space-around; padding-top: 10px; }
        .tab-item { color: #888; text-align: center; font-size: 10px; }
        .tab-item.active { color: var(--blue-apple); }
        .icon { font-size: 24px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h1 style="margin-bottom: 30px; text-align: center;">Acesso</h1>
        <div class="input-group"><input type="text" id="user" placeholder="Usuário" class="border-thin"></div>
        <div class="input-group"><input type="password" id="pass" placeholder="Senha" class="border-thin"></div>
        <button class="btn-main" onclick="app.login()">ENTRAR NO SISTEMA</button>
    </div>

    <div id="main-app" class="hidden">
        <header><h1>Rádios</h1></header>

        <div class="section-header"><span>Top 100 Brasil</span></div>
        <div id="car-brasil" class="carousel-wrapper"></div>

        <div class="section-header"><span>Top 100 Internacional</span></div>
        <div id="car-internacional" class="carousel-wrapper"></div>

        <div class="section-header"><span>Top 100 Segmentadas</span></div>
        <div id="car-segmento" class="carousel-wrapper"></div>

        <nav class="tab-bar">
            <div class="tab-item active"><div class="icon">📻</div>Rádios</div>
            <div class="tab-item"><div class="icon">⚽</div>Esportes</div>
            <div class="tab-item"><div class="icon">⭐</div>Favoritos</div>
            <div class="tab-item"><div class="icon">🔍</div>Buscar</div>
        </nav>
    </div>

    <div id="details-modal">
        <div class="modal-body">
            <div class="big-thumb border-thin" id="m-img"></div>
            <h2 id="m-title">Nome da Rádio</h2>
            <p class="location-tag" id="m-loc">Cidade, Estado</p>
            <div class="desc-text" id="m-desc">Carregando informações da rádio...</div>
            
            <div class="btn-row">
                <button class="btn-action btn-memory" onclick="app.playMemory()">MEMÓRIA REPETITIVA</button>
                <button class="btn-action btn-back" onclick="app.closeDetails()">VOLTAR INÍCIO</button>
            </div>
        </div>
    </div>

    <script>
        const app = {
            memoryStack: [],
            
            login: () => {
                // Inteligência simples de bypass para teste
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                app.init();
            },

            init: () => {
                app.renderGroup('car-brasil', 'Brasil');
                app.renderGroup('car-internacional', 'Mundo');
                app.renderGroup('car-segmento', 'Estilo');
            },

            renderGroup: (containerId, prefix) => {
                const container = document.getElementById(containerId);
                for (let i = 1; i <= 100; i++) {
                    const card = document.createElement('div');
                    card.className = 'radio-card';
                    card.innerHTML = `
                        <div class="thumb border-thin">IMG</div>
                        <span>${prefix} ${i}</span>
                    `;
                    card.onclick = () => app.openDetails(prefix + " " + i, "Localização " + i);
                    container.appendChild(card);
                }
            },

            openDetails: (nome, local) => {
                const desc = `Esta rádio é referência em transmissão digital, operando diretamente de ${local} com tecnologia de ponta e programação 24h.`;
                document.getElementById('m-title').innerText = nome;
                document.getElementById('m-loc').innerText = local;
                document.getElementById('m-desc').innerText = desc;
                document.getElementById('details-modal').style.display = 'block';
                
                // Inteligência de Memória (Push para pilha)
                app.memoryStack.push({nome, local, desc});
            },

            closeDetails: () => {
                document.getElementById('details-modal').style.display = 'none';
            },

            playMemory: () => {
                if (app.memoryStack.length > 1) {
                    app.memoryStack.pop(); // Tira a atual
                    const prev = app.memoryStack[app.memoryStack.length - 1];
                    app.openDetails(prev.nome, prev.local);
                } else {
                    alert("Fim da sequência de memória.");
                }
            }
        };
    </script>
</body>
</html>
