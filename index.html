<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lamonie Radio PRO</title>
    <style>
        :root {
            --bg: #000000;
            --accent: #007AFF;
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background: var(--bg); color: white; padding-bottom: 90px; }

        header {
            padding: 50px 20px 20px;
            text-align: center;
            position: sticky;
            top: 0;
            background: rgba(0,0,0,0.95);
            z-index: 100;
        }
        header h1 { font-size: 28px; font-weight: 700; }

        .section { margin-bottom: 35px; }
        .section-header {
            padding: 0 20px 12px;
            color: var(--accent);
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .carousel {
            display: flex;
            overflow-x: auto;
            gap: 16px;
            padding: 0 20px 20px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .carousel::-webkit-scrollbar { display: none; }

        .radio-card {
            min-width: 130px;
            cursor: pointer;
            text-align: center;
        }

        .thumb {
            width: 130px;
            height: 130px;
            border-radius: 20px;
            overflow: hidden;
            background: #1a1a1a;
            box-shadow: 0 6px 20px rgba(0,0,0,0.5);
            margin-bottom: 10px;
        }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }

        .radio-name {
            font-size: 13.5px;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 3px;
        }
        .radio-info {
            font-size: 11.5px;
            color: #aaaaaa;
        }

        /* Modal */
        #details-modal {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.96); z-index: 2000;
            display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-content {
            background: #111; border-radius: 28px; width: 100%; max-width: 380px;
            padding: 30px 25px; text-align: center;
        }
        .big-img { width: 190px; height: 190px; border-radius: 24px; margin: 0 auto 20px; box-shadow: 0 10px 30px rgba(0,122,255,0.3); }
        .modal-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
        .modal-loc { color: var(--accent); font-size: 15px; margin-bottom: 20px; }

        .player-bar {
            background: #1a1a1a; border-radius: 18px; padding: 16px 20px;
            margin: 25px 0; display: flex; align-items: center; justify-content: space-between;
        }

        .btn-row { display: flex; gap: 12px; }
        .btn {
            flex: 1; padding: 16px; border-radius: 16px; font-weight: 600; font-size: 15px; border: none; cursor: pointer;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: #222; color: white; border: 1px solid #333; }

        .tab-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 85px;
            background: rgba(0,0,0,0.95); border-top: 0.5px solid #222;
            display: flex; justify-content: space-around; align-items: center; z-index: 1000; padding-bottom: 8px;
        }
        .tab-item { display: flex; flex-direction: column; align-items: center; color: #888; font-size: 10px; gap: 4px; }
        .tab-item.active { color: var(--accent); }
        .tab-item div { font-size: 24px; }
    </style>
</head>
<body>

    <header><h1>Rádios</h1></header>

    <div class="section">
        <div class="section-header">POP-ROCK SUGERIDAS</div>
        <div id="poprock-carousel" class="carousel"></div>
    </div>

    <div class="section">
        <div class="section-header">ROCK SUGERIDAS</div>
        <div id="rock-carousel" class="carousel"></div>
    </div>

    <div class="section">
        <div class="section-header">SERTANEJO SUGERIDAS</div>
        <div id="sertanejo-carousel" class="carousel"></div>
    </div>

    <!-- Modal -->
    <div id="details-modal">
        <div class="modal-content">
            <img id="m-img" src="" class="big-img">
            <h2 id="m-title" class="modal-title"></h2>
            <p id="m-loc" class="modal-loc"></p>
            <p id="m-desc" style="color:#999; font-size:14px; line-height:1.4; margin:20px 0;"></p>

            <div class="player-bar">
                <span id="status">Pronto para tocar</span>
                <button onclick="app.togglePlay()" style="background:none;border:none;color:white;font-size:28px;">▶️</button>
            </div>

            <audio id="audio-player" controls style="display:none;"></audio>

            <div class="btn-row">
                <button class="btn btn-secondary" onclick="app.playMemory()">Memória</button>
                <button class="btn btn-primary" onclick="app.closeDetails()">Fechar</button>
            </div>
        </div>
    </div>

    <!-- Tab Bar -->
    <nav class="tab-bar">
        <div class="tab-item active"><div>📻</div><span>Rádios</span></div>
        <div class="tab-item"><div>⚽</div><span>Esportes</span></div>
        <div class="tab-item"><div>⭐</div><span>Favoritos</span></div>
        <div class="tab-item"><div>🔍</div><span>Buscar</span></div>
        <div class="tab-item"><div>⋯</div><span>Mais</span></div>
    </nav>

    <script>
        const app = {
            memory: [],
            currentStream: "",

            fetchRadios: async (params, containerId) => {
                try {
                    const response = await fetch(`https://de1.api.radio-browser.info/json/stations/search?${params}&limit=10&hidebroken=true&order=clickcount&reverse=true`);
                    const data = await response.json();
                    app.renderRadios(data, containerId);
                } catch (e) { console.error(e); }
            },

            renderRadios: (data, containerId) => {
                const container = document.getElementById(containerId);
                container.innerHTML = '';

                data.forEach(radio => {
                    const card = document.createElement('div');
                    card.className = 'radio-card';
                    card.onclick = () => app.openDetails(radio);

                    const logo = radio.favicon || 'https://via.placeholder.com/130?text=RADIO';

                    card.innerHTML = `
                        <div class="thumb"><img src="${logo}" alt="${radio.name}"></div>
                        <div class="radio-name">${radio.name}</div>
                        <div class="radio-info">
                            ${radio.state ? radio.state + ' - ' : ''}${radio.country || 'Brasil'}
                        </div>
                    `;
                    container.appendChild(card);
                });
            },

            openDetails: (radio) => {
                app.currentStream = radio.url_resolved || radio.url;
                document.getElementById('m-img').src = radio.favicon || 'https://via.placeholder.com/190?text=RADIO';
                document.getElementById('m-title').innerText = radio.name;
                document.getElementById('m-loc').innerText = `${radio.state || ''} ${radio.country ? '- ' + radio.country : 'Brasil'}`;
                document.getElementById('m-desc').innerText = `Bitrate: ${radio.bitrate || '?'}kbps | Tags: ${radio.tags || 'Não informado'}`;

                document.getElementById('details-modal').style.display = 'flex';
                document.getElementById('status').innerText = "Pausado";

                if (!app.memory.some(r => r.stationuuid === radio.stationuuid)) {
                    app.memory.push(radio);
                }
            },

            togglePlay: () => {
                const player = document.getElementById('audio-player');
                const status = document.getElementById('status');
                if (player.src !== app.currentStream) player.src = app.currentStream;

                if (player.paused) {
                    player.play();
                    status.innerText = "Tocando ao vivo...";
                } else {
                    player.pause();
                    status.innerText = "Pausado";
                }
            },

            closeDetails: () => {
                document.getElementById('audio-player').pause();
                document.getElementById('details-modal').style.display = 'none';
            },

            playMemory: () => {
                if (app.memory.length > 1) {
                    const prev = app.memory[app.memory.length - 2];
                    app.openDetails(prev);
                } else {
                    alert("Nenhuma rádio anterior na memória!");
                }
            },

            init: () => {
                // Parâmetros diferentes para evitar repetição
                app.fetchRadios("country=Brazil&tag=pop,rock", "poprock-carousel");
                app.fetchRadios("country=Brazil&tag=rock", "rock-carousel");
                app.fetchRadios("country=Brazil&tag=sertanejo", "sertanejo-carousel");
            }
        };

        app.init();
    </script>
</body>
</html>
