<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lamonie Rádio PRO</title>

<style>
:root{
--bg:#000;
--card:#111;
--glass:rgba(255,255,255,0.08);
--blur: blur(20px);
--blue:#0A84FF;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system}

body{
background:var(--bg);
color:#fff;
overflow-x:hidden;
}

/* HEADER */
header{
position:fixed;
top:0;
width:100%;
padding:20px;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(20px);
z-index:1000;
}

header h1{
font-size:22px;
text-align:center;
}

/* SEARCH */
.search{
margin-top:70px;
padding:10px;
display:flex;
gap:10px;
}

.search input{
flex:1;
padding:12px;
border-radius:25px;
border:none;
background:#1c1c1e;
color:#fff;
}

.search button{
width:45px;
border-radius:50%;
border:none;
background:var(--blue);
color:#fff;
font-size:18px;
}

/* SECTION */
.section{
margin-top:10px;
}

.section h2{
font-size:14px;
padding:10px 15px;
color:#0A84FF;
}

/* CAROUSEL */
.carousel{
display:flex;
overflow-x:auto;
gap:15px;
padding:10px 15px;
scroll-behavior:smooth;
}

.carousel::-webkit-scrollbar{display:none}

/* CARD */
.card{
min-width:110px;
cursor:pointer;
}

.thumb{
width:110px;
height:110px;
border-radius:20px;
overflow:hidden;
background:#222;
}

.thumb img{
width:100%;
height:100%;
object-fit:cover;
}

.card span{
font-size:11px;
color:#ccc;
display:block;
margin-top:5px;
}

/* MODAL */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:2000;
}

.modal img{
width:180px;
height:180px;
border-radius:20px;
margin-bottom:20px;
}

.modal h2{margin-bottom:5px}
.modal p{color:#aaa;font-size:14px;text-align:center;padding:0 20px}

/* PLAYER FLOAT */
.player{
position:fixed;
bottom:80px;
left:10px;
right:10px;
background:var(--glass);
backdrop-filter:blur(20px);
padding:10px;
border-radius:20px;
display:flex;
align-items:center;
justify-content:space-between;
transition:0.4s;
}

.player.hide{
transform:translateY(120%);
opacity:0;
}

/* BOTÕES MODERNOS */
.btn{
background:rgba(255,255,255,0.1);
border:none;
padding:10px;
border-radius:50%;
color:#fff;
font-size:18px;
}

/* TAB BAR */
.tab{
position:fixed;
bottom:0;
width:100%;
height:70px;
background:var(--glass);
backdrop-filter:blur(20px);
display:flex;
justify-content:space-around;
align-items:center;
}

.tab div{
font-size:12px;
color:#aaa;
text-align:center;
}

.tab .active{color:#fff}

</style>
</head>

<body>

<header><h1>Rádios</h1></header>

<div class="search">
<input id="search" placeholder="Buscar rádio...">
<button onclick="app.search()">🔍</button>
</div>

<div class="section">
<h2>Brasil</h2>
<div id="br" class="carousel"></div>
</div>

<div class="section">
<h2>Internacional</h2>
<div id="int" class="carousel"></div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
<img id="m-img">
<h2 id="m-title"></h2>
<p id="m-info"></p>
</div>

<!-- PLAYER -->
<div id="player" class="player">
<span id="now">Nada tocando</span>
<div>
<button class="btn" onclick="app.back()">⏮</button>
<button class="btn" onclick="app.play()">▶️</button>
</div>
</div>

<!-- TAB -->
<div class="tab">
<div class="active">📻<br>Rádios</div>
<div>⭐<br>Favoritos</div>
<div onclick="window.scrollTo(0,0)">🏠<br>Início</div>
</div>

<audio id="audio"></audio>

<script>

const app={
memory:[],
current:null,

fetch: async(q,id)=>{
const res=await fetch(`https://de1.api.radio-browser.info/json/stations/search?${q}&limit=50&hidebroken=true`);
const data=await res.json();

const el=document.getElementById(id);
el.innerHTML="";

data.forEach(r=>{
const card=document.createElement("div");
card.className="card";
card.onclick=()=>app.open(r);

card.innerHTML=`
<div class="thumb">
<img src="${r.favicon || 'https://via.placeholder.com/100'}">
</div>
<span>${r.name}</span>
`;

el.appendChild(card);
});
},

open:(r)=>{
app.current=r.url_resolved;

document.getElementById("modal").style.display="flex";
document.getElementById("m-img").src=r.favicon;
document.getElementById("m-title").innerText=r.name;
document.getElementById("m-info").innerText=
`${r.state || ''} - ${r.country} | ${r.bitrate}kbps`;

document.getElementById("now").innerText=r.name;

app.memory.push(r);
},

play:()=>{
const a=document.getElementById("audio");

if(a.src!==app.current){
a.src=app.current;
}

if(a.paused){a.play()}
else{a.pause()}
},

back:()=>{
if(app.memory.length>1){
app.memory.pop();
const prev=app.memory[app.memory.length-1];
app.open(prev);
}
},

search:()=>{
const val=document.getElementById("search").value;
app.fetch(`name=${val}`,"br");
},

init:()=>{
app.fetch("country=Brazil","br");
app.fetch("language=english","int");
}
};

app.init();

/* SCROLL ESCONDER PLAYER */
let last=0;
window.addEventListener("scroll",()=>{
let y=window.scrollY;
const player=document.getElementById("player");

if(y>last){player.classList.add("hide")}
else{player.classList.remove("hide")}

last=y;
});

</script>

</body>
</html>
