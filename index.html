<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIE MUSIC - Botões Reais</title>
    <style>
        :root {
            --orange: #ff8c00;
            --glass: rgba(25, 25, 25, 0.8);
            --glass-bright: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: white; font-family: -apple-system, sans-serif; overflow: hidden; }

        /* --- BOTÃO DE VIDRO REAL (ESTILO PLAYER) --- */
        .glass-button {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid var(--orange);
            border-radius: 50px; /* Formato de cápsula igual da imagem */
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 25px;
            box-shadow: inset 0 1px 1px var(--glass-bright);
            cursor: pointer;
            transition: transform 0.1s;
        }
        .glass-button:active { transform: scale(0.96); }

        /* HEADER */
        header { padding: 50px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 32px; font-weight: 800; color: var(--orange); }

        /* GRADE DE RÁDIOS (3 colunas x 2 linhas visíveis) */
        #main-container { height: 70vh; overflow-y: auto; padding: 20px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .radio-square { 
            aspect-ratio: 1/1; 
            background: #111; 
            border-radius: 15px; 
            border: 0.5px solid #333; 
            overflow: hidden;
            position: relative;
        }
        .radio-square img { width: 100%; height: 100%; object-fit: cover; }

        /* --- BARRA DE CONTROLE (BOTÃO IGUAL DA IMAGEM) --- */
        #player-control {
            position: fixed;
            bottom: 110px;
            left: 15px;
            right: 15px;
            height: 70px;
            z-index: 1000;
            display: none; /* Só aparece quando der play */
        }
        .player-capsule {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }
        .info-area { display: flex; align-items: center; gap: 10px; }
        .mini-art { width: 45px; height: 45px; border-radius: 8px; background: #222; }

        /* --- TAB BAR (BOTÕES DE NAVEGAÇÃO CÁPSULA) --- */
        .tab-bar {
            position: fixed;
            bottom: 20px;
            left: 15px;
            right: 15px;
            height: 65px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 10px;
        }
        .tab-btn {
            height: 45px;
            flex: 1;
            margin: 0 5px;
            font-size: 12px;
            font-weight: 600;
        }
        .tab-btn.active { background: rgba(255, 69, 58, 0.2); border-color: #ff453a; color: #ff453a; }

        .search-circle {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: 0.5px solid var(--orange);
            background: var(--glass);
            backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            bottom: 25px;
            right: 20px;
            z-index: 1100;
        }
    </style>
</head>
<body>

    <header><h1>Rádio</h1></header>

    <div id="main-container">
        </div>

    <div id="player-control">
        <div class="glass-button player-capsule">
            <div class="info-area">
                <img id="p-img" class="mini-art">
                <div>
                    <div id="p-title" style="font-size: 14px; font-weight: bold;">Selecionar Rádio</div>
                    <div id="p-sub" style="font-size: 11px; color: #888;">Ao Vivo</div>
                </div>
            </div>
            <div style="display: flex; gap: 20px; font-size: 20px;">
                <span onclick="audio.toggle()">⏯️</span>
                <span>⏭️</span>
            </div>
        </div>
    </div>

    <nav class="tab-bar">
        <div class="glass-button tab-btn">Início</div>
        <div class="glass-button tab-btn">Rádio</div>
        <div class="glass-button tab-btn active">Biblioteca</div>
    </nav>

    <div class="search-circle">🔍</div>

    <audio id="player"></audio>

    <script>
        const audio = {
            init: async () => {
                const res = await fetch('https://de1.api.radio-browser.info/json/stations/search?country=Brazil&limit=60&hidebroken=true&order=clickcount&reverse=true');
                const data = await res.json();
                const container = document.getElementById('main-container');
                data.forEach(r => {
                    const div = document.createElement('div');
                    div.className = 'radio-square';
                    div.onclick = () => audio.play(r);
                    div.innerHTML = `<img src="${r.favicon || 'https://via.placeholder.com/150/111/orange?text=LAMONIE'}">`;
                    container.appendChild(div);
                });
            },
            play: (r) => {
                const p = document.getElementById('player');
                const dock = document.getElementById('player-control');
                p.src = r.url_resolved;
                p.play();
                document.getElementById('p-img').src = r.favicon;
                document.getElementById('p-title').innerText = r.name;
                dock.style.display = 'block';
            },
            toggle: () => {
                const p = document.getElementById('player');
                p.paused ? p.play() : p.pause();
            }
        };
        audio.init();
    </script>
</body>
</html>
