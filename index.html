<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lamoniê Flow - Elite Edition</title>
    <style>
        :root { 
            --bg: #000; 
            --apple-red: #ff2d55;
            --glass-bright: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.22);
            --blur: blur(35px) saturate(200%);
        }
        
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: white; padding-bottom: 180px; overflow-x: hidden; }

        header { padding: 60px 20px 10px; font-size: 32px; font-weight: 800; }
        .section-title { padding: 10px 20px; color: #007AFF; font-size: 12px; font-weight: 700; text-transform: uppercase; }

        /* GRID PREMIUM */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 10px 20px; }
        .card { background: #1c1c1e; border-radius: 18px; overflow: hidden; border: 0.5px solid #333; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }

        /* --- NOVO MINI PLAYER INTELIGENTE (ESTILO APPLE) --- */
        #mini-player-dock {
            position: fixed; bottom: 125px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 440px; height: 60px;
            background: rgba(30, 30, 30, 0.85);
            backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            border-radius: 15px; border: 1px solid var(--glass-border);
            display: none; align-items: center; justify-content: space-between;
            padding: 0 15px; z-index: 9999;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        .mini-info { display: flex; align-items: center; gap: 12px; max-width: 70%; }
        .mini-art { width: 42px; height: 42px; border-radius: 8px; background: #333; }
        .mini-text { overflow: hidden; }
        .mini-title { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mini-subtitle { font-size: 11px; color: #888; }
        
        .mini-controls { display: flex; gap: 15px; }
        .mini-btn { width: 24px; height: 24px; fill: white; cursor: pointer; }

        /* BARRA UNIFICADA (MANTIDA PROFISSONAL) */
        .apple-dock-container {
            position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 500px; height: 80px; z-index: 10000;
        }

        .glass-dock {
            width: 100%; height: 100%; 
            background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.05) 100%);
            backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 1px 2px rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: space-around;
            padding: 0 15px;
        }

        .nav-item { 
            display: flex; flex-direction: column; align-items: center; 
            color: rgba(255,255,255,0.5); font-size: 10px; font-weight: 700; 
            cursor: pointer; transition: 0.3s; flex: 1;
        }
        
        .nav-item.active { color: white; }
        .nav-item.active svg { fill: var(--apple-red); filter: drop-shadow(0 0 5px rgba(255,45,85,0.4)); }

        .nav-item svg { width: 26px; height: 26px; margin-bottom: 5px; fill: rgba(255,255,255,0.5); transition: 0.3s; }

    </style>
</head>
<body>

    <header id="main-title">Rádios</header>
    <div id="radio-grid" class="grid"></div>

    <div id="mini-player-dock">
        <div class="mini-info">
            <img id="m-art" class="mini-art">
            <div class="mini-text">
                <div id="m-title" class="mini-title">Carregando...</div>
                <div class="mini-subtitle">Ao Vivo</div>
            </div>
        </div>
        <div class="mini-controls">
            <svg class="mini-btn" onclick="togglePlayback()" viewBox="0 0 24 24"><path id="mini-play-path" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            <svg class="mini-btn" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </div>
    </div>

    <div class="apple-dock-container">
        <div class="glass-dock">
            
            <div class="nav-item active" id="nav-home" onclick="go('home')">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                <span>INÍCIO</span>
            </div>

            <div class="nav-item" id="nav-lib" onclick="go('lib')">
                <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                <span>MÚSICA</span>
            </div>

            <div class="nav-item" onclick="doSearch()">
                <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                <span>BUSCA</span>
            </div>

        </div>
    </div>

    <audio id="audio-engine"></audio>

    <script>
        // Inteligência para abrir o rádio e mostrar o Mini Player
        function openRadio(r) {
            // ... lógica de tocar ...
            document.getElementById('m-art').src = r.favicon;
            document.getElementById('m-title').innerText = r.name;
            document.getElementById('mini-player-dock').style.display = 'flex'; // Mostra o dock flutuante
        }

        // Lógica de Play/Pause dinâmica no Mini Player
        const player = document.getElementById('audio-engine');
        const miniPlayPath = document.getElementById('mini-play-path');

        function togglePlayback() {
            if(!player.src) return;
            if(player.paused) {
                player.play();
                miniPlayPath.setAttribute("d", "M6 19h4V5H6v14zm8-14v14h4V5h-4z"); // Pause
            } else {
                player.pause();
                miniPlayPath.setAttribute("d", "M8 5v14l11-7z"); // Play
            }
        }
        // ... resto do seu código original ...
    </script>
</body>
</html>
