<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lamoniê Flow - Premium</title>
    <style>
        :root { 
            --bg: #000; 
            --apple-red: #ff2d55;
            --glass: rgba(28, 28, 30, 0.9);
            --glass-border: rgba(255, 255, 255, 0.1);
            --yellow: #FFD700;
        }
        
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; overflow-x: hidden; width: 100vw; }

        /* TOPO FIXO QUE NÃO SOBE */
        .header-fixed-top {
            position: sticky;
            top: 0;
            z-index: 1500;
            background: var(--bg);
            padding-bottom: 5px;
        }

        header { padding: 40px 20px 5px; font-size: 32px; font-weight: 800; }

        .section-container { margin-bottom: 25px; width: 100%; }
        .section-title { padding: 0 20px 10px; font-size: 20px; font-weight: 700; color: #fff; }
        
        .horizontal-scroll { 
            display: flex; overflow-x: auto; gap: 15px; padding: 0 20px 10px; 
            scrollbar-width: none; -ms-overflow-style: none; 
        }
        .horizontal-scroll::-webkit-scrollbar { display: none; }

        /* CAPAS GRANDES E VISÍVEIS */
        .card { 
            width: 160px; min-width: 160px; background: #1c1c1e; border-radius: 16px; 
            overflow: hidden; border: 0.5px solid #333; position: relative; flex-shrink: 0;
        }
        .card-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; background: #2c2c2e; }
        
        .badge-type {
            position: absolute; top: 12px; left: 12px; background: var(--apple-red);
            color: white; font-size: 10px; font-weight: 900; padding: 2px 7px;
            border-radius: 4px; z-index: 5; text-transform: uppercase;
        }

        .card-info { padding: 12px 10px; font-size: 13px; font-weight: 600; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .fav-btn {
            position: absolute; top: 8px; right: 8px; width: 34px; height: 34px;
            background: rgba(0,0,0,0.6); border-radius: 50%; display: flex;
            align-items: center; justify-content: center; z-index: 10;
        }
        .fav-btn svg { width: 22px; fill: #666; }
        .fav-btn.active svg { fill: var(--yellow); }

        /* CONTEÚDO QUE ROLA PARA CIMA/BAIXO */
        .scrollable-content { padding-bottom: 220px; }

        #player-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2500; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .player-art { width: 80%; max-width: 320px; aspect-ratio: 1/1; border-radius: 28px; object-fit: cover; box-shadow: 0 20px 60px rgba(0,0,0,0.9); margin-bottom: 30px; }

        /* BARRAS SEMPRE NO TOPO */
        .mini-player {
            position: fixed; bottom: 125px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 420px; height: 60px; background: var(--glass);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 14px; border: 1px solid var(--glass-border);
            display: none; align-items: center; padding: 0 15px; z-index: 2000;
        }
        .mini-art { width: 44px; height: 44px; border-radius: 8px; object-fit: cover; margin-right: 15px; }

        .apple-dock { 
            position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 420px; height: 80px; z-index: 2100; 
            background: var(--glass); backdrop-filter: blur(30px) saturate(180%); 
            border-radius: 40px; border: 1px solid var(--glass-border); 
            display: flex; align-items: center; justify-content: space-around; 
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; flex: 1; color: #8e8e93; }
        .nav-item.active { color: #fff; }
        .nav-item svg { width: 26px; height: 26px; margin-bottom: 4px; fill: currentColor; }
        .nav-item span { font-size: 10px; font-weight: 700; }
        .dock-play-btn { width: 62px; height: 62px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="main-content">
        <div class="header-fixed-top">
            <header>Rádios</header>
            <div id="carousels-top"></div> </div>
        
        <div class="scrollable-content" id="carousels-bottom">
            </div>
    </div>

    <div id="mini-player" class="mini-player" onclick="reopenPlayer()">
        <img id="m-art" class="mini-art" src="">
        <div style="flex:1; overflow:hidden;"><h4 id="m-name" style="white-space:nowrap; text-overflow:ellipsis; overflow:hidden;">Rádio</h4></div>
        <div onclick="event.stopPropagation(); togglePlayback();"><svg viewBox="0 0 24 24" width="32"><path id="mini-play-icon" fill="white" d="M8 5v14l11-7z"/></svg></div>
    </div>

    <div class="apple-dock">
        <div class="nav-item active" onclick="changeTab('home', this)"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>INÍCIO</span></div>
        <div class="nav-item" onclick="changeTab('lib', this)"><svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9H9V9h10v2zm-4 4H9v-2h6v2zm4-8H9V5h10v2z"/></svg><span>BIBLIOTECA</span></div>
        <div class="dock-play-btn" onclick="togglePlayback()"><svg viewBox="0 0 24 24" width="34"><path id="play-icon" fill="white" d="M8 5v14l11-7z"/></svg></div>
        <div class="nav-item" onclick="changeTab('grid', this)"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg><span>BUSCA</span></div>
    </div>

    <div id="player-view">
        <img id="p-art" class="player-art" src="">
        <h2 id="p-name">Nome da Rádio</h2>
        <p id="p-loc" style="color:#8e8e93; margin-top:5px;">Localização</p>
    </div>

    <audio id="audio-engine"></audio>

    <script>
        const audio = document.getElementById('audio-engine');
        let favorites = JSON.parse(localStorage.getItem('lamonie_favs')) || [];
        let currentRadio = null;

        const trapiaAM = { name: "Trapiá AM", stationuuid: "t1", favicon: "https://trapiafm.com.br/wp-content/uploads/2023/04/cropped-logo-trapia-1.png", url_resolved: "https://shout11.srvstm.com/8314/stream" };

        async function loadRadios() {
            try {
                const res = await fetch(`https://de1.api.radio-browser.info/json/stations/search?limit=200&hidebroken=true&order=clickcount&reverse=true`);
                const data = await res.json();
                
                // 1. CARROSSEL FIXO (FORRÓ)
                const forroData = [trapiaAM, ...data.filter(r => r.tags.toLowerCase().includes('forro'))].slice(0, 15);
                renderCarousel("Prioridade Forró & Trapiá", forroData, document.getElementById('carousels-top'));

                // 2. VÁRIAS FILEIRAS NA VERTICAL (Rádio Brasil e Gêneros)
                const bottomArea = document.getElementById('carousels-bottom');
                const genres = ["Pop Brasil", "Sertanejo", "Notícias", "Top Mundo", "Anos 80", "Religiosas", "Jazz"];
                genres.forEach((g, i) => {
                    renderCarousel(g, data.slice(i*15 + 15, i*15 + 30), bottomArea);
                });
            } catch(e) { console.error(e); }
        }

        function renderCarousel(title, list, container) {
            const sec = document.createElement('div');
            sec.className = 'section-container';
            sec.innerHTML = `<div class="section-title">${title}</div><div class="horizontal-scroll"></div>`;
            const scroll = sec.querySelector('.horizontal-scroll');
            list.forEach(r => scroll.appendChild(createCard(r)));
            container.appendChild(sec);
        }

        function createCard(radio) {
            const el = document.createElement('div');
            el.className = 'card';
            el.onclick = () => openRadio(radio);
            const isFav = favorites.some(f => f.stationuuid === radio.stationuuid);
            el.innerHTML = `
                <div class="badge-type">FM</div>
                <div class="fav-btn ${isFav ? 'active' : ''}" onclick="event.stopPropagation(); toggleFav('${radio.stationuuid}')">
                    <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                </div>
                <img class="card-img" src="${radio.favicon || 'https://via.placeholder.com/160/2c2c2e/fff?text=Radio'}" onerror="this.src='https://via.placeholder.com/160/2c2c2e/fff?text=Rádio'">
                <div class="card-info">${radio.name}</div>
            `;
            return el;
        }

        function openRadio(radio) {
            currentRadio = radio;
            document.getElementById('p-art').src = radio.favicon || 'https://via.placeholder.com/300/2c2c2e/fff?text=Radio';
            document.getElementById('p-name').innerText = radio.name;
            document.getElementById('m-art').src = radio.favicon || 'https://via.placeholder.com/40/2c2c2e/fff?text=R';
            document.getElementById('m-name').innerText = radio.name;
            document.getElementById('player-view').style.display = 'flex';
            document.getElementById('mini-player').style.display = 'flex';
            if(audio.src !== radio.url_resolved) { audio.src = radio.url_resolved; audio.play(); updateIcon(true); }
        }

        function reopenPlayer() { if(currentRadio) document.getElementById('player-view').style.display = 'flex'; }
        function changeTab(mode, btn) { document.getElementById('player-view').style.display = 'none'; }
        function togglePlayback() { if(audio.paused) { audio.play(); updateIcon(true); } else { audio.pause(); updateIcon(false); } }
        function updateIcon(p) { const path = p ? "M6 19h4V5H6v14zm8-14v14h4V5h-4z" : "M8 5v14l11-7z"; document.getElementById('play-icon').setAttribute('d', path); document.getElementById('mini-play-icon').setAttribute('d', path); }

        loadRadios();
    </script>
</body>
</html>
