<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lamoniê Flow - Apple Advanced</title>
    <style>
        :root { --bg: #000; --apple-dark: #1c1c1e; --accent: #ff2d55; --glass: rgba(25, 25, 25, 0.8); }
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: white; padding-bottom: 160px; overflow-x: hidden; }

        header { padding: 60px 20px 10px; font-size: 32px; font-weight: 800; }
        .section-title { padding: 10px 20px; color: #007AFF; font-size: 12px; font-weight: 700; text-transform: uppercase; }

        /* GRID 2 COLUNAS */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 10px 20px; }
        .card { background: var(--apple-dark); border-radius: 14px; overflow: hidden; position: relative; border: 0.5px solid #333; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .card-name { padding: 10px; font-size: 13px; font-weight: 600; text-align: center; }

        /* ESTRELA VOLTOU */
        .star-fav { 
            position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.6); 
            width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(10px); z-index: 5; font-size: 14px; color: #ffd700;
        }

        /* PÁGINA DE DETALHES SEM BOTÃO PLAY */
        #details-view {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 8000; display: none; flex-direction: column; align-items: center; padding-top: 80px;
        }
        .big-thumb { width: 80%; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.7); margin-bottom: 30px; }
        .info-area { padding: 0 40px; text-align: center; }
        .info-area h2 { font-size: 24px; margin-bottom: 10px; }
        .info-area p { color: #888; font-size: 15px; line-height: 1.6; }

        /* BARRA DE NAVEGAÇÃO AVANÇADA (ESTILO IMG_7851 / 7853) */
        .advanced-bar {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 92%; height: 80px; display: flex; align-items: center; justify-content: space-between; z-index: 10000;
        }
        .nav-main {
            flex: 1; height: 100%; background: var(--glass); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-radius: 40px; margin-right: 12px; display: flex; align-items: center; justify-content: space-around;
            border: 0.5px solid rgba(255,255,255,0.1);
        }
        .nav-btn { display: flex; flex-direction: column; align-items: center; color: #888; font-size: 10px; font-weight: 600; }
        .nav-btn.active { color: white; }
        .nav-btn span { font-size: 24px; margin-bottom: 4px; }

        /* BOTÃO DE PLAY/PAUSE CENTRAL NA BARRA (MODERNO) */
        .play-center-btn {
            width: 75px; height: 75px; background: var(--apple-dark); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; border: 0.5px solid #444;
            font-size: 28px; color: white; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        /* BUSCA */
        .search-circle {
            width: 60px; height: 60px; background: var(--apple-dark); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; border: 0.5px solid #333; font-size: 22px;
        }
    </style>
</head>
<body>

    <header id="main-title">Rádios</header>

    <div id="content-home">
        <div class="section-title" id="sub-title">Rádios do Brasil</div>
        <div class="grid" id="radio-grid"></div>
    </div>

    <div id="details-view">
        <img id="det-img" class="big-thumb" src="">
        <div class="info-area">
            <h2 id="det-name">Nome</h2>
            <p id="det-full-desc">Descrição completa da rádio aparecerá aqui com todos os detalhes técnicos e localização.</p>
        </div>
    </div>

    <div class="advanced-bar">
        <nav class="nav-main">
            <div class="nav-btn active" id="btn-home" onclick="nav('home')"><span>🏠</span>Início</div>
            <div class="nav-btn" id="btn-lib" onclick="nav('lib')"><span>📚</span>Biblioteca</div>
        </nav>
        
        <div class="play-center-btn" onclick="toggleAudio()" id="master-play">▶️</div>
        
        <div style="width: 15px;"></div> <div class="search-circle" onclick="searchRadio()">🔍</div>
    </div>

    <audio id="main-audio"></audio>

    <script>
        let database = [];
        let favs = JSON.parse(localStorage.getItem('bibiu_favs_v3')) || [];
        const player = document.getElementById('main-audio');

        async function start() {
            const r = await fetch('https://de1.api.radio-browser.info/json/stations/search?country=Brazil&limit=80&hidebroken=true&order=clickcount&reverse=true');
            database = await r.json();
            render(database);
        }

        function render(list) {
            const grid = document.getElementById('radio-grid');
            grid.innerHTML = '';
            list.forEach(radio => {
                const isF = favs.some(f => f.changeuuid === radio.changeuuid);
                grid.innerHTML += `
                    <div class="card" onclick="openPlayer('${radio.changeuuid}')">
                        <div class="star-fav" onclick="event.stopPropagation(); toggleStar('${radio.changeuuid}')">
                            ${isF ? '⭐' : '☆'}
                        </div>
                        <img src="${radio.favicon || 'https://via.placeholder.com/200/1c1c1e/white?text=RADIO'}">
                        <div class="card-name">${radio.name}</div>
                    </div>
                `;
            });
        }

        function openPlayer(id) {
            const r = database.find(x => x.changeuuid === id) || favs.find(x => x.changeuuid === id);
            document.getElementById('det-img').src = r.favicon || '';
            document.getElementById('det-name').innerText = r.name;
            document.getElementById('det-full-desc').innerText = `Tocando agora em ${r.state || 'Brasil'}. Qualidade digital ${r.bitrate}kbps. Tags: ${r.tags || 'Música'}.`;
            
            player.src = r.url_resolved;
            player.play();
            document.getElementById('master-play').innerText = '⏸️';
            document.getElementById('details-view').style.display = 'flex';
        }

        function toggleAudio() {
            if(player.paused) { player.play(); document.getElementById('master-play').innerText = '⏸️'; }
            else { player.pause(); document.getElementById('master-play').innerText = '▶️'; }
        }

        function toggleStar(id) {
            const radio = database.find(x => x.changeuuid === id);
            const idx = favs.findIndex(f => f.changeuuid === id);
            if(idx > -1) favs.splice(idx, 1);
            else favs.push(radio);
            localStorage.setItem('bibiu_favs_v3', JSON.stringify(favs));
            render(database);
        }

        function nav(mode) {
            document.getElementById('details-view').style.display = 'none';
            if(mode === 'home') {
                document.getElementById('btn-home').classList.add('active');
                document.getElementById('btn-lib').classList.remove('active');
                document.getElementById('main-title').innerText = "Rádios";
                document.getElementById('sub-title').innerText = "Rádios do Brasil";
                render(database);
            } else {
                document.getElementById('btn-lib').classList.add('active');
                document.getElementById('btn-home').classList.remove('active');
                document.getElementById('main-title').innerText = "Biblioteca";
                document.getElementById('sub-title').innerText = "Suas Favoritas";
                render(favs);
            }
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function searchRadio() {
            const q = prompt("Qual rádio você busca?");
            if(q) render(database.filter(r => r.name.toLowerCase().includes(q.toLowerCase())));
        }

        start();
    </script>
</body>
</html>
