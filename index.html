<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lamonie Rádio PRO</title>

<style>
body{background:#000;color:#fff;font-family:-apple-system;margin:0}
header{padding:20px;text-align:center;font-size:20px}
.carousel{display:flex;overflow-x:auto;gap:15px;padding:10px}
.card{min-width:110px;cursor:pointer}
.thumb{width:110px;height:110px;background:#222;border-radius:20px;overflow:hidden}
.thumb img{width:100%;height:100%;object-fit:cover}
.player{
position:fixed;
bottom:0;
width:100%;
background:#111;
padding:15px;
display:flex;
justify-content:space-between;
}
button{background:#0A84FF;border:none;color:#fff;padding:10px;border-radius:10px}
</style>
</head>

<body>

<header>Rádios</header>

<div id="list" class="carousel"></div>

<div class="player">
<span id="status">Parado</span>
<button onclick="app.play()">▶️</button>
</div>

<audio id="audio"></audio>

<script>

const app={
current:"",
fetch: async ()=>{
const res=await fetch("https://de1.api.radio-browser.info/json/stations/search?country=Brazil&limit=30&hidebroken=true&order=clickcount");
const data=await res.json();

const list=document.getElementById("list");

data.forEach(r=>{
if(!r.url_resolved.startsWith("http")) return;

const el=document.createElement("div");
el.className="card";

el.innerHTML=`
<div class="thumb">
<img src="${r.favicon || 'https://via.placeholder.com/100'}">
</div>
`;

el.onclick=()=>{
app.current=r.url_resolved;
document.getElementById("status").innerText="Pronto: "+r.name;
};

list.appendChild(el);
});
},

play:()=>{
const a=document.getElementById("audio");

if(!app.current){
alert("Escolha uma rádio");
return;
}

a.src=app.current;

a.play()
.then(()=>{
document.getElementById("status").innerText="Tocando...";
})
.catch(()=>{
document.getElementById("status").innerText="Erro ao tocar";
});
}

};

app.fetch();

</script>

</body>
</html>
