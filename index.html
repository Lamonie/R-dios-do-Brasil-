<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lamoniê Flow - Apple Advanced</title>
    <style>
        :root { 
            --bg: #000; 
            --apple-red: #ff2d55;
            --glass-bg: rgba(30, 30, 30, 0.6);
            --glass-border: rgba(255, 255, 255, 0.15);
            --blur: blur(25px);
        }
        
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: white; padding-bottom: 180px; overflow-x: hidden; }

        header { padding: 60px 20px 10px; font-size: 32px; font-weight: 800; }
        .section-title { padding: 10px 20px; color: #007AFF; font-size: 12px; font-weight: 700; text-transform: uppercase; }

        /* GRID PREMIUM */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 10px 20px; }
        .card { background: #1c1c1e; border-radius: 18px; overflow: hidden; position: relative; border: 0.5px solid #333; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .card-name { padding: 10px; font-size: 13px; font-weight: 600; text-align: center; }

        .star-fav { 
            position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.6); 
            width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(10px); z-index: 5; font-size: 14px; color: #ffd700;
        }

        /* TELA DE DETALHES */
        #details-view {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 8000; display: none; flex-direction: column; align-items: center; padding-top: 80px;
        }
        .big-thumb { width: 85%; border-radius: 25px; box-shadow: 0 25px 60px rgba(0,0,0,0.8); margin-bottom: 30px; }

        /* A NOVA BARRA INTELIGENTE (ESTILO IMG_7872 / IMG_7865) */
        .apple-dock-wrapper {
            position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%);
            width: 94%; max-width: 450px; height: 85px; z-index: 10000;
            display: flex; align-items: center; justify-content: space-between;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* EFEITO ESCONDE-ESCONDE */
        .apple-dock-wrapper.hide-bar { transform: translateX(-50%) translateY(130px); opacity: 0; }

        .glass-container {
            flex: 1; height: 100%; 
            background: var(--glass-bg);
            backdrop-filter: var(--blur) saturate(180%);
            -webkit-backdrop-filter: var(--blur) saturate(180%);
            border-radius: 45px; margin-right: 12px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: space-around;
            padding: 0 15px;
        }

        .nav-item { display: flex; flex-direction: column; align-items: center; color: #888; font-size: 10px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--apple-red); } /* Botão Vermelho Apple */
        .nav-item span { font-size: 24px; margin-bottom: 4px; }

        /* BOTÃO DE PLAY MODERNO CIRCULAR */
        .play-outer {
            width: 85px; height: 85px; border-radius: 50%;
            background: linear-gradient(135deg, #2c2c2e, #000);
            border: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6), inset 0 2px 2px rgba(255,255,255,0.1);
            cursor: pointer;
        }

        /* BUSCA INDEPENDENTE */
        .search-circle {
            width: 65px; height: 65px; border-radius: 50%;
            background: var(--glass-bg); backdrop-filter: var(--blur);
            border: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; margin-left: 12px;
        }
    </style>
</head>
<body>

    <header id="main-title">Rádios</header>

    <div id="view-home">
        <div class="section-title" id="sub-title">Fenômeno de Jaíbaras</div>
        <div class="grid" id="radio-grid"></div>
    </div>

    <div id="details-view">
        <img id="det-img" class="big-thumb" src="">
        <div style="text-align: center; padding: 20px;">
            <h2 id="det-name" style="font-size: 26px;">Nome da Rádio</h2>
            <p id="det-desc" style="color: #888; margin-top: 10px;"></p>
        </div>
    </div>

    <div class="apple-dock-wrapper" id="main-dock">
        <div class="glass-container">
            <div class="nav-item active" id="nav-home" onclick="go('home')">
                <span>🏠</span>Início
            </div>
            <div class="nav-item" id="nav-lib" onclick="go('lib')">
                <span>📚</span>Biblioteca
            </div>
        </div>

        <div class="play-outer" onclick="togglePlayback()">
            <span id="btn-play-icon" style="font-size: 34px;">▶️</span>
        </div>

        <div class="search-circle" onclick="doSearch()">🔍</div>
    </div>

    <audio id="audio-engine"></audio>

    <script>
        let allRadios = [];
        let myFavs = JSON.parse(localStorage.getItem('bibiu_v5_favs')) || [];
        const player = document.getElementById('audio-engine');
        const dock = document.getElementById('main-dock');
        let lastScroll = 0;

        // INTELIGÊNCIA DE ROLAGEM (ESCONDE-ESCONDE)
        window.addEventListener('scroll', () => {
            const currentScroll = window.pageYOffset;
            if (currentScroll > lastScroll && currentScroll > 100) {
                dock.classList.add('hide-bar');
            } else {
                dock.classList.remove('hide-bar');
            }
            lastScroll = currentScroll;
        });

        async function init() {
            const r = await fetch('https://de1.api.radio-browser.info/json/stations/search?country=Brazil&limit=80&hidebroken=true&order=clickcount&reverse=true');
            allRadios = await r.json();
            render(allRadios);
        }

        function render(list) {
            const grid = document.getElementById('radio-grid');
            grid.innerHTML = '';
            list.forEach(r => {
                const isF = myFavs.some(f => f.changeuuid === r.changeuuid);
                grid.innerHTML += `
                    <div class="card" onclick="openRadio('${r.changeuuid}')">
                        <div class="star-fav" onclick="event.stopPropagation(); toggleFav('${r.changeuuid}')">
                            ${isF ? '⭐' : '☆'}
                        </div>
                        <img src="${r.favicon || 'https://via.placeholder.com/300/1c1c1e/white?text=RADIO'}">
                        <div class="card-name">${r.name}</div>
                    </div>
                `;
            });
        }

        function openRadio(id) {
            const r = allRadios.find(x => x.changeuuid === id) || myFavs.find(x => x.changeuuid === id);
            document.getElementById('det-img').src = r.favicon || '';
            document.getElementById('det-name').innerText = r.name;
            document.getElementById('det-desc').innerText = `Rádio de ${r.state || 'Brasil'}. Qualidade: ${r.bitrate}kbps.`;
            
            player.src = r.url_resolved;
            player.play();
            document.getElementById('btn-play-icon').innerText = '⏸️';
            document.getElementById('details-view').style.display = 'flex';
        }

        function togglePlayback() {
            if(!player.src) return;
            if(player.paused) { player.play(); document.getElementById('btn-play-icon').innerText = '⏸️'; }
            else { player.pause(); document.getElementById('btn-play-icon').innerText = '▶️'; }
        }

        function go(mode) {
            document.getElementById('details-view').style.display = 'none';
            if(mode === 'home') {
                document.getElementById('nav-home').classList.add('active');
                document.getElementById('nav-lib').classList.remove('active');
                document.getElementById('main-title').innerText = "Rádios";
                render(allRadios);
            } else {
                document.getElementById('nav-lib').classList.add('active');
                document.getElementById('nav-home').classList.remove('active');
                document.getElementById('main-title').innerText = "Biblioteca";
                render(myFavs);
            }
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function toggleFav(id) {
            const r = allRadios.find(x => x.changeuuid === id);
            const idx = myFavs.findIndex(f => f.changeuuid === id);
            if(idx > -1) myFavs.splice(idx, 1);
            else myFavs.push(r);
            localStorage.setItem('bibiu_v5_favs', JSON.stringify(myFavs));
            render(allRadios);
        }

        function doSearch() {
            const q = prompt("O que vamos ouvir hoje?");
            if(q) render(allRadios.filter(r => r.name.toLowerCase().includes(q.toLowerCase())));
        }

        init();
    </script>
</body>
</html>
