<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lamonie Radio PRO - API REAL</title>
    <style>
        :root {
            --orange: #ff8c00;
            --blue: #007AFF;
            --bg: #000;
            --card-bg: #121212;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: white; overflow-x: hidden; padding-bottom: 100px; }

        .border-thin { border: 0.5px solid var(--orange); }
        .hidden { display: none !important; }

        /* HEADER */
        header { padding: 40px 20px 10px; sticky; top: 0; background: rgba(0,0,0,0.9); z-index: 100; }
        header h1 { font-size: 30px; }

        /* SEÇÕES E CARROSSEL */
        .section-header { padding: 20px 20px 5px; color: var(--blue); font-weight: 600; font-size: 14px; text-transform: uppercase; }
        .carousel { display: flex; overflow-x: auto; gap: 15px; padding: 10px 20px 20px; scroll-behavior: smooth; }
        .carousel::-webkit-scrollbar { display: none; }

        .radio-card { min-width: 120px; max-width: 120px; cursor: pointer; text-align: center; }
        .thumb { width: 120px; height: 120px; background: #1a1a1a; border-radius: 18px; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }
        .radio-card span { font-size: 11px; color: #ccc; font-weight: 500; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* MODAL (ABA DE DESCRIÇÃO) */
        #details-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: none; flex-direction: column; padding: 40px 20px; }
        .modal-body { background: #111; border-radius: 25px; padding: 30px; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .big-img { width: 180px; height: 180px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 0 20px rgba(255,140,0,0.3); }
        .location { color: var(--blue); font-weight: bold; margin-bottom: 10px; }
        .desc { text-align: center; color: #999; font-size: 14px; margin-bottom: 30px; line-height: 1.4; }

        /* PLAYER CONTROL */
        .player-bar { width: 100%; background: #222; border-radius: 15px; padding: 15px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
        audio { display: none; }

        .btn-row { display: flex; gap: 10px; width: 100%; }
        .btn { flex: 1; padding: 16px; border-radius: 14px; border: none; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-back { background: var(--blue); color: white; }
        .btn-mem { background: #333; color: white; border: 0.5px solid var(--orange); }

        /* TAB BAR */
        .tab-bar { position: fixed; bottom: 0; width: 100%; height: 80px; background: rgba(0,0,0,0.95); border-top: 0.5px solid #222; display: flex; justify-content: space-around; padding-top: 10px; z-index: 1000; }
        .tab-item { color: #777; font-size: 10px; text-align: center; }
        .active-tab { color: var(--blue); }
    </style>
</head>
<body>

    <header><h1>Rádios</h1></header>

    <div class="section-header">Brasil (Top 100)</div>
    <div id="br-carousel" class="carousel"></div>

    <div class="section-header">Populares Internacional</div>
    <div id="intl-carousel" class="carousel"></div>

    <div id="details-modal">
        <div class="modal-body border-thin">
            <img id="m-img" src="" class="big-img border-thin">
            <h2 id="m-title">Nome</h2>
            <p class="location" id="m-loc">Localização</p>
            <p class="desc" id="m-desc">Descrição</p>

            <div class="player-bar border-thin">
                <span id="status">Pronto para tocar</span>
                <button onclick="app.togglePlay()" style="background:none; border:none; color:white; font-size:24px;">▶️</button>
            </div>
            
            <audio id="audio-player" controls></audio>

            <div class="btn-row">
                <button class="btn btn-mem" onclick="app.playMemory()">MEMÓRIA REPETITIVA</button>
                <button class="btn btn-back" onclick="app.closeDetails()">VOLTAR INÍCIO</button>
            </div>
        </div>
    </div>

    <nav class="tab-bar">
        <div class="tab-item active-tab"><div>📻</div><span>Rádios</span></div>
        <div class="tab-item"><div>⚽</div><span>Esportes</span></div>
        <div class="tab-item"><div>⭐</div><span>Favoritos</span></div>
        <div class="tab-item"><div>🔍</div><span>Buscar</span></div>
    </nav>

    <script>
        const app = {
            memory: [],
            currentStream: "",

            // Busca as rádios reais da API
            fetchRadios: async (params, containerId) => {
                try {
                    const response = await fetch(`https://de1.api.radio-browser.info/json/stations/search?${params}&limit=100&hidebroken=true&order=clickcount&reverse=true`);
                    const data = await response.json();
                    app.render(data, containerId);
                } catch (e) { console.error("Erro na API", e); }
            },

            render: (data, containerId) => {
                const container = document.getElementById(containerId);
                data.forEach(radio => {
                    const logo = radio.favicon || 'https://via.placeholder.com/120?text=RADIO';
                    const card = document.createElement('div');
                    card.className = 'radio-card';
                    card.onclick = () => app.openDetails(radio);
                    card.innerHTML = `
                        <div class="thumb border-thin"><img src="${logo}"></div>
                        <span>${radio.name}</span>
                    `;
                    container.appendChild(card);
                });
            },

            openDetails: (radio) => {
                app.currentStream = radio.url_resolved;
                document.getElementById('m-img').src = radio.favicon || 'https://via.placeholder.com/180?text=RADIO';
                document.getElementById('m-title').innerText = radio.name;
                document.getElementById('m-loc').innerText = `${radio.state || ''} - ${radio.country}`;
                document.getElementById('m-desc').innerText = `Tags: ${radio.tags || 'Variadas'}. Qualidade: ${radio.bitrate}kbps. Clique no play para ouvir agora!`;
                
                document.getElementById('details-modal').style.display = 'flex';
                document.getElementById('status').innerText = "Pausado";
                
                // Salva na memória
                app.memory.push(radio);
            },

            togglePlay: () => {
                const player = document.getElementById('audio-player');
                const status = document.getElementById('status');
                if (player.src !== app.currentStream) {
                    player.src = app.currentStream;
                }
                
                if (player.paused) {
                    player.play();
                    status.innerText = "Tocando ao vivo...";
                } else {
                    player.pause();
                    status.innerText = "Pausado";
                }
            },

            closeDetails: () => {
                document.getElementById('audio-player').pause();
                document.getElementById('details-modal').style.display = 'none';
            },

            playMemory: () => {
                if (app.memory.length > 1) {
                    app.memory.pop();
                    const prev = app.memory[app.memory.length - 1];
                    app.openDetails(prev);
                } else {
                    alert("Início da memória!");
                }
            },

            init: () => {
                app.fetchRadios("country=Brazil", "br-carousel");
                app.fetchRadios("language=english", "intl-carousel");
            }
        };

        app.init();
    </script>
</body>
</html>
