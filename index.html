<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIE MUSIC - VOLTA DAS RÁDIOS</title>
    <style>
        :root {
            --orange: #ff8c00;
            --ios-red: #ff3b30;
            --glass: rgba(25, 25, 25, 0.85);
            --border-thin: 0.5px solid var(--orange);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: white; font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh; }

        /* HEADER */
        header { padding: 55px 20px 10px; }
        header h1 { font-size: 34px; font-weight: 800; color: var(--orange); }

        /* GRADE FIXA DE RÁDIOS (3 COLUNAS) - NÃO FICA BOBA */
        #main-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 20px;
            height: calc(100vh - 250px);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .radio-item { aspect-ratio: 1/1; background: #1c1c1e; border-radius: 14px; border: 0.5px solid #333; overflow: hidden; cursor: pointer; }
        .radio-item img { width: 100%; height: 100%; object-fit: cover; }

        /* --- BOTÃO DE PLAY (CÁPSULA DE VIDRO IGUAL IMAGEM) --- */
        #play-capsule {
            position: fixed; bottom: 105px; left: 15px; right: 15px;
            height: 72px; background: var(--glass); backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px); border-radius: 20px;
            display: none; align-items: center; justify-content: space-between;
            padding: 0 15px; border: var(--border-thin); z-index: 3000;
        }
        .p-info { display: flex; align-items: center; gap: 12px; max-width: 60%; }
        .p-art { width: 50px; height: 50px; border-radius: 10px; background: #333; border: 0.5px solid #444; }
        .p-text { overflow: hidden; }
        .p-title { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .p-controls { display: flex; gap: 20px; font-size: 24px; cursor: pointer; }

        /* --- TAB BAR (BOTÕES DE VIDRO AVANÇADOS) --- */
        .tab-bar {
            position: fixed; bottom: 25px; left: 15px; right: 90px;
            height: 60px; display: flex; gap: 10px; z-index: 2000;
        }
        .btn-vidro {
            flex: 1; height: 100%; background: var(--glass); backdrop-filter: blur(25px);
            border-radius: 30px; border: var(--border-thin); display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 600; color: #fff; cursor: pointer;
        }
        /* Botão Biblioteca com Destaque Rosa/Vermelho */
        .btn-vidro.active { color: var(--ios-red); border-color: var(--ios-red); background: rgba(255, 59, 48, 0.15); }

        /* BOTÃO BUSCA (REDONDO) */
        .btn-busca {
            position: fixed; bottom: 25px; right: 15px;
            width: 60px; height: 60px; background: #1c1c1e;
            border-radius: 50%; border: var(--border-thin);
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; z-index: 2000; cursor: pointer;
        }
    </style>
</head>
<body>

    <header><h1>Rádio</h1></header>

    <div id="main-grid"></div>

    <div id="play-capsule">
        <div class="p-info">
            <img id="p-img" class="p-art">
            <div class="p-text">
                <div id="p-name" class="p-title">Carregando...</div>
                <div style="font-size: 11px; color: var(--orange);">Ao Vivo</div>
            </div>
        </div>
        <div class="p-controls">
            <span onclick="lamonie.toggle()" id="play-icon">⏸️</span>
            <span>⏩</span>
        </div>
    </div>

    <nav class="tab-bar">
        <div class="btn-vidro" onclick="location.reload()"><div>🏠</div>Início</div>
        <div class="btn-vidro"><div>📻</div>Rádio</div>
        <div class="btn-vidro active"><div>📋</div>Biblioteca</div>
    </nav>
    <div class="btn-busca">🔍</div>

    <audio id="audio-engine" crossorigin="anonymous"></audio>

    <script>
        const lamonie = {
            init: async () => {
                const grid = document.getElementById('main-grid');
                grid.innerHTML = ""; // Limpa antes de carregar
                try {
                    // Busca focada em Forró e Brasil (Ceará/Nordeste)
                    const res = await fetch('https://de1.api.radio-browser.info/json/stations/search?country=Brazil&tag=forro,brega,nordeste&limit=100&hidebroken=true&order=clickcount&reverse=true');
                    const data = await res.json();
                    
                    data.forEach(r => {
                        const box = document.createElement('div');
                        box.className = 'radio-item';
                        box.onclick = () => lamonie.play(r);
                        box.innerHTML = `<img src="${r.favicon || 'https://via.placeholder.com/150/1c1c1e/orange?text=RADIO'}">`;
                        grid.appendChild(box);
                    });
                } catch(e) { console.error("Erro ao carregar as rádios."); }
            },
            play: (r) => {
                const audio = document.getElementById('audio-engine');
                const dock = document.getElementById('play-capsule');
                audio.src = r.url_resolved;
                audio.play();
                
                document.getElementById('p-img').src = r.favicon || '';
                document.getElementById('p-name').innerText = r.name;
                dock.style.display = 'flex';
                document.getElementById('play-icon').innerText = "⏸️";
            },
            toggle: () => {
                const a = document.getElementById('audio-engine');
                const i = document.getElementById('play-icon');
                if(a.paused) { a.play(); i.innerText = "⏸️"; }
                else { a.pause(); i.innerText = "▶️"; }
            }
        };
        lamonie.init();
    </script>
</body>
</html>
