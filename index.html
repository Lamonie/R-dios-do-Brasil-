<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lamoniê Flow - Apple Premium</title>
    <style>
        :root { 
            --apple-red: #ff2d55; 
            --glass-bg: rgba(35, 35, 35, 0.45);
            --glass-border: rgba(255, 255, 255, 0.18);
        }
        
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: #000; color: white; padding-bottom: 200px; overflow-x: hidden; }

        header { padding: 60px 20px 10px; font-size: 34px; font-weight: 800; letter-spacing: -1px; }

        /* GRID 2 COLUNAS */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 10px 20px; }
        .card { background: #1c1c1e; border-radius: 20px; overflow: hidden; position: relative; border: 0.5px solid #333; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }

        /* A BARRA DA IMAGEM IMG_7872 (REFEITA DO ZERO) */
        .dock-container {
            position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 460px; height: 90px; z-index: 9999;
            display: flex; align-items: center; justify-content: space-between;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1); /* Suavidade Apple */
        }

        /* INTELIGÊNCIA ESCONDE-ESCONDE */
        .dock-container.scrolled-down { transform: translateX(-50%) translateY(150px); opacity: 0; }

        .glass-bar {
            flex: 1; height: 100%; 
            background: var(--glass-bg);
            backdrop-filter: blur(35px) saturate(200%);
            -webkit-backdrop-filter: blur(35px) saturate(200%);
            border-radius: 45px; margin-right: 12px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: space-around;
            padding: 0 10px;
        }

        .nav-btn { display: flex; flex-direction: column; align-items: center; color: #8e8e93; font-size: 10px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { color: var(--apple-red); } /* Fica vermelho como na foto */
        .nav-btn span { font-size: 26px; margin-bottom: 4px; }

        /* BOTÃO PLAY CIRCULAR COM BRILHO */
        .play-circle {
            width: 85px; height: 85px; border-radius: 50%;
            background: linear-gradient(145deg, #2c2c2e, #000);
            border: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5), inset 0 2px 2px rgba(255,255,255,0.1);
            cursor: pointer;
        }

        .search-outer {
            width: 65px; height: 65px; border-radius: 50%;
            background: var(--glass-bg); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; margin-left: 12px;
        }

        #details-view {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 8000; display: none; flex-direction: column; align-items: center; padding-top: 60px;
        }
    </style>
</head>
<body>

    <header id="title">Rádios</header>

    <div id="home">
        <div class="grid" id="grid"></div>
    </div>

    <div id="details-view">
        <img id="det-img" style="width: 80%; border-radius: 20px; margin-bottom: 20px;">
        <h2 id="det-name"></h2>
    </div>

    <div class="dock-container" id="dock">
        <div class="glass-bar">
            <div class="nav-btn active" id="btn-home" onclick="nav('home')">
                <span>🏠</span>Início
            </div>
            <div class="nav-btn" id="btn-lib" onclick="nav('lib')">
                <span>📚</span>Biblioteca
            </div>
        </div>

        <div class="play-circle" onclick="togglePlayback()">
            <span id="p-icon" style="font-size: 32px;">▶️</span>
        </div>

        <div class="search-outer" onclick="search()">🔍</div>
    </div>

    <audio id="audio"></audio>

    <script>
        let db = [];
        let favs = JSON.parse(localStorage.getItem('favs_bibiu')) || [];
        const audio = document.getElementById('audio');
        const dock = document.getElementById('dock');
        let lastScroll = 0;

        // SENSOR DE MOVIMENTO (ESCONDE-ESCONDE)
        window.addEventListener('scroll', () => {
            let top = window.pageYOffset;
            if (top > lastScroll && top > 80) {
                dock.classList.add('scrolled-down');
            } else {
                dock.classList.remove('scrolled-down');
            }
            lastScroll = top;
        });

        async function start() {
            const r = await fetch('https://de1.api.radio-browser.info/json/stations/search?country=Brazil&limit=60&hidebroken=true&order=clickcount&reverse=true');
            db = await r.json();
            render(db);
        }

        function render(list) {
            const g = document.getElementById('grid');
            g.innerHTML = '';
            list.forEach(r => {
                g.innerHTML += `<div class="card" onclick="play('${r.changeuuid}')"><img src="${r.favicon || 'https://via.placeholder.com/200/1c1c1e/white?text=RADIO'}"></div>`;
            });
        }

        function play(id) {
            const r = db.find(x => x.changeuuid === id) || favs.find(x => x.changeuuid === id);
            audio.src = r.url_resolved;
            audio.play();
            document.getElementById('p-icon').innerText = '⏸️';
            document.getElementById('det-img').src = r.favicon;
            document.getElementById('det-name').innerText = r.name;
            document.getElementById('details-view').style.display = 'flex';
        }

        function togglePlayback() {
            if(audio.paused) { audio.play(); document.getElementById('p-icon').innerText = '⏸️'; }
            else { audio.pause(); document.getElementById('p-icon').innerText = '▶️'; }
        }

        function nav(m) {
            document.getElementById('details-view').style.display = 'none';
            if(m === 'home') {
                document.getElementById('btn-home').classList.add('active');
                document.getElementById('btn-lib').classList.remove('active');
                document.getElementById('title').innerText = "Rádios";
                render(db);
            } else {
                document.getElementById('btn-lib').classList.add('active');
                document.getElementById('btn-home').classList.remove('active');
                document.getElementById('title').innerText = "Biblioteca";
                render(favs);
            }
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function search() {
            let q = prompt("O que busca, fenômeno?");
            if(q) render(db.filter(x => x.name.toLowerCase().includes(q.toLowerCase())));
        }

        start();
    </script>
</body>
</html>
