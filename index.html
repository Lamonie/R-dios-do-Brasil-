<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIE MUSIC</title>
    <style>
        /* --- ESQUELETO (VISUAL) --- */
        :root {
            --orange-border: #ff8c00;
            --bg-black: #000000;
            --surface: #121212;
            --text-main: #ffffff;
            --text-dim: #8e8e93;
            --accent-blue: #007AFF;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }

        body { background-color: var(--bg-black); color: var(--text-main); overflow-x: hidden; }

        /* Estilo das Bordas Fininhas Laranjas */
        .thin-border { border: 0.5px solid var(--orange-border); }

        /* Header Estilo App Moderno */
        header { 
            padding: 50px 20px 15px; 
            background: rgba(0,0,0,0.9);
            position: sticky; top: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
        }
        .app-name { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; color: var(--orange-border); }

        /* Navegação por Categorias (Estilo RadiosNet) */
        .nav-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px;
        }
        .nav-btn {
            background: var(--surface); padding: 15px; border-radius: 12px;
            display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 500;
        }

        /* Carrosséis de Rádios */
        .section-label { 
            padding: 20px 20px 10px; font-size: 18px; font-weight: 700; 
            display: flex; justify-content: space-between; align-items: center;
        }
        .see-all { color: var(--accent-blue); font-size: 13px; }

        .carousel {
            display: flex; overflow-x: auto; gap: 15px; padding: 0 20px 20px;
            scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
        }
        .carousel::-webkit-scrollbar { display: none; }

        .radio-card { 
            min-width: 130px; scroll-snap-align: start; cursor: pointer;
        }
        .radio-img {
            width: 130px; height: 130px; background: #1c1c1e;
            border-radius: 18px; margin-bottom: 8px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .radio-img img { width: 100%; height: 100%; object-fit: cover; }
        .radio-name { font-size: 12px; font-weight: 500; text-align: center; color: var(--text-main); }

        /* Aba de Detalhes (Modal Inteligente) */
        #modal-info {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 2000;
            display: none; flex-direction: column; padding: 40px 20px;
        }
        .modal-content {
            background: var(--surface); height: 100%; border-radius: 30px;
            padding: 30px; display: flex; flex-direction: column; align-items: center;
        }
        .modal-logo { width: 180px; height: 180px; border-radius: 20px; margin-bottom: 25px; }
        .modal-location { color: var(--accent-blue); font-weight: bold; margin: 10px 0; }
        .modal-desc { text-align: center; color: var(--text-dim); font-size: 14px; margin-bottom: 30px; }

        /* Botões de Comando */
        .action-row { display: flex; gap: 10px; width: 100%; margin-top: auto; }
        .btn-act { flex: 1; padding: 18px; border-radius: 15px; border: none; font-weight: 700; cursor: pointer; }
        .btn-blue { background: var(--accent-blue); color: white; }
        .btn-dark { background: #2c2c2e; color: white; }

        /* Menu Inferior Fixo */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 85px;
            background: rgba(18, 18, 18, 0.95); backdrop-filter: blur(20px);
            border-top: 0.5px solid #333;
            display: flex; justify-content: space-around; padding-top: 10px;
        }
        .nav-item { text-align: center; color: var(--text-dim); font-size: 10px; }
        .nav-item.active { color: var(--orange-border); }
        .nav-icon { font-size: 22px; margin-bottom: 4px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <div class="app-name">LAMONIE MUSIC</div>
        <div style="font-size: 20px;">🔍</div>
    </header>

    <div class="nav-grid">
        <div class="nav-btn thin-border"><span>🇧🇷</span> Brasil</div>
        <div class="nav-btn thin-border"><span>🌍</span> Países</div>
        <div class="nav-btn thin-border"><span>🏙️</span> Cidades</div>
        <div class="nav-btn thin-border"><span>🎸</span> Gêneros</div>
    </div>

    <div class="section-label">Top 100 Brasil <span class="see-all">Ver tudo</span></div>
    <div id="br-list" class="carousel"></div>

    <div class="section-label">Internacionais <span class="see-all">Ver tudo</span></div>
    <div id="intl-list" class="carousel"></div>

    <div id="modal-info">
        <div class="modal-content thin-border">
            <img id="m-img" src="" class="modal-logo thin-border">
            <h2 id="m-title">Lamonie Radio</h2>
            <p class="modal-location" id="m-loc">Ceará, Brasil</p>
            <p class="modal-desc" id="m-desc">A melhor programação musical para você.</p>
            
            <div id="player-status" style="margin-bottom: 20px; font-weight: bold; color: var(--orange-border);">Pronto</div>
            
            <div class="action-row">
                <button class="btn-act btn-dark thin-border" onclick="core.backMemory()">MEMÓRIA REPETITIVA</button>
                <button class="btn-act btn-blue" onclick="core.close()">VOLTAR INÍCIO</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active"><div class="nav-icon">📻</div><div>Rádios</div></div>
        <div class="nav-item"><div class="nav-icon">🎧</div><div>Estilos</div></div>
        <div class="nav-item"><div class="nav-icon">⭐</div><div>Favoritos</div></div>
        <div class="nav-item"><div class="nav-icon">👤</div><div>Perfil</div></div>
    </nav>

    <script>
        /* --- INTELIGÊNCIA (FUNÇÕES) --- */
        const core = {
            history: [],
            
            // Busca dados da API
            loadRadios: async (query, targetId) => {
                const url = `https://de1.api.radio-browser.info/json/stations/search?${query}&limit=100&hidebroken=true&order=clickcount&reverse=true`;
                try {
                    const res = await fetch(url);
                    const data = await res.json();
                    core.render(data, targetId);
                } catch(e) { console.log("Erro de conexão"); }
            },

            render: (data, targetId) => {
                const el = document.getElementById(targetId);
                data.forEach(r => {
                    const card = document.createElement('div');
                    card.className = 'radio-card';
                    card.onclick = () => core.open(r);
                    card.innerHTML = `
                        <div class="radio-img thin-border">
                            <img src="${r.favicon || 'https://via.placeholder.com/130/1c1c1e/white?text=RADIO'}">
                        </div>
                        <div class="radio-name">${r.name}</div>
                    `;
                    el.appendChild(card);
                });
            },

            open: (radio) => {
                document.getElementById('m-img').src = radio.favicon || 'https://via.placeholder.com/180/1c1c1e/white?text=LAMONIE';
                document.getElementById('m-title').innerText = radio.name;
                document.getElementById('m-loc').innerText = `${radio.state || ''} ${radio.country}`;
                document.getElementById('m-desc').innerText = `Tags: ${radio.tags || 'Música, Informação'}. Transmissão digital via LAMONIE MUSIC.`;
                document.getElementById('modal-info').style.display = 'flex';
                core.history.push(radio);
            },

            close: () => {
                document.getElementById('modal-info').style.display = 'none';
            },

            backMemory: () => {
                if(core.history.length > 1) {
                    core.history.pop();
                    core.open(core.history[core.history.length - 1]);
                } else {
                    alert("Início da memória sequencial.");
                }
            },

            start: () => {
                core.loadRadios("country=Brazil", "br-list");
                core.loadRadios("language=english", "intl-list");
            }
        };

        core.start();
    </script>
</body>
</html>
