<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lamoniê Flow - Elite Edition</title>
    <style>
        :root { 
            --bg: #000; 
            --apple-red: #ff2d55;
            --glass-bright: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.22);
        }
        
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: white; padding-bottom: 180px; overflow-x: hidden; }

        header { padding: 60px 20px 10px; font-size: 32px; font-weight: 800; }
        .section-title { padding: 10px 20px; color: #007AFF; font-size: 12px; font-weight: 700; text-transform: uppercase; }

        /* GRID PREMIUM */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 10px 20px; }
        .card { background: #1c1c1e; border-radius: 18px; overflow: hidden; border: 0.5px solid #333; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .card-name { padding: 10px; font-size: 13px; font-weight: 600; text-align: center; }

        /* A BARRA UNIFICADA CRISTALINA */
        .apple-dock-container {
            position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 500px; height: 80px; z-index: 10000;
        }

        .glass-dock {
            width: 100%; height: 100%; 
            background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.05) 100%);
            backdrop-filter: blur(35px) saturate(200%);
            -webkit-backdrop-filter: blur(35px) saturate(200%);
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 1px 2px rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: space-around;
            padding: 0 15px;
        }

        /* BOTÕES AVANÇADOS (ESTILO STREAMING REAL) */
        .nav-item { 
            display: flex; flex-direction: column; align-items: center; 
            color: rgba(255,255,255,0.5); font-size: 10px; font-weight: 700; 
            cursor: pointer; transition: 0.3s; flex: 1;
        }
        
        /* Cor de destaque quando selecionado */
        .nav-item.active { color: white; }
        .nav-item.active svg { fill: var(--apple-red); filter: drop-shadow(0 0 5px rgba(255,45,85,0.4)); }

        .nav-item svg { 
            width: 26px; height: 26px; margin-bottom: 5px; 
            fill: rgba(255,255,255,0.5); transition: 0.3s; 
        }

        /* BOTÃO PLAY CENTRALIZADO E PODEROSO */
        .play-trigger {
            width: 65px; height: 65px; border-radius: 50%;
            background: linear-gradient(145deg, rgba(255,255,255,0.2), rgba(0,0,0,0.3));
            display: flex; align-items: center; justify-content: center;
            border: 1.5px solid var(--glass-border);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            transition: 0.2s;
        }
        .play-trigger:active { transform: scale(0.9); }
        .play-trigger svg { width: 30px; height: 30px; fill: white; }

    </style>
</head>
<body>

    <header id="main-title">Rádios</header>
    <div id="radio-grid" class="grid"></div>

    <div class="apple-dock-container">
        <div class="glass-dock">
            
            <div class="nav-item active" id="nav-home" onclick="go('home')">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                <span>INÍCIO</span>
            </div>

            <div class="nav-item" id="nav-lib" onclick="go('lib')">
                <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                <span>MÚSICA</span>
            </div>

            <div class="play-trigger" onclick="togglePlayback()">
                <svg id="play-svg" viewBox="0 0 24 24"><path id="play-path" d="M8 5v14l11-7z"/></svg>
            </div>

            <div class="nav-item" onclick="doSearch()">
                <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                <span>BUSCA</span>
            </div>

        </div>
    </div>

    <audio id="audio-engine"></audio>

    <script>
        const player = document.getElementById('audio-engine');
        const playPath = document.getElementById('play-path');

        function togglePlayback() {
            if(!player.src) return;
            if(player.paused) {
                player.play();
                playPath.setAttribute("d", "M6 19h4V5H6v14zm8-14v14h4V5h-4z"); // Ícone de Pause
            } else {
                player.pause();
                playPath.setAttribute("d", "M8 5v14l11-7z"); // Ícone de Play
            }
        }

        function go(mode) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if(mode === 'home') document.getElementById('nav-home').classList.add('active');
            else document.getElementById('nav-lib').classList.add('active');
            // Sua lógica de renderização aqui...
        }

        function doSearch() {
            prompt("O que vamos ouvir hoje, fenômeno?");
        }
    </script>
</body>
</html>
