<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lamoniê Flow - Oficial</title>
    <style>
        :root { 
            --bg: #000; 
            --apple-red: #ff2d55;
            --glass: rgba(28, 28, 30, 0.85);
            --glass-border: rgba(255, 255, 255, 0.1);
            --yellow: #FFD700;
        }
        
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; padding-bottom: 150px; }

        header { padding: 50px 20px 10px; font-size: 32px; font-weight: 800; }
        .section-title { padding: 20px 20px 10px; font-size: 18px; font-weight: 700; }

        /* GRID COM DUAS CAPAS LADO A LADO */
        .main-grid { 
            display: grid; grid-template-columns: repeat(2, 1fr); 
            gap: 15px; padding: 0 20px; 
        }

        .card { 
            background: #1c1c1e; border-radius: 14px; overflow: hidden; 
            border: 0.5px solid #333; position: relative;
        }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }
        .card-info { padding: 10px; font-size: 12px; font-weight: 600; text-align: center; }
        
        /* ESTRELA DE FAVORITOS NAS CAPAS */
        .fav-btn {
            position: absolute; top: 8px; right: 8px; width: 30px; height: 30px;
            background: rgba(0,0,0,0.6); border-radius: 50%; display: flex;
            align-items: center; justify-content: center; z-index: 10;
        }
        .fav-btn svg { width: 18px; fill: #666; }
        .fav-btn.active svg { fill: var(--yellow); }

        /* BARRA DOCK ESTILO APPLE */
        .apple-dock {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 450px; height: 75px; z-index: 1000;
            background: var(--glass); backdrop-filter: blur(25px) saturate(180%);
            border-radius: 40px; border: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: space-around;
        }

        .nav-item { display: flex; flex-direction: column; align-items: center; flex: 1; color: #8e8e93; position: relative; }
        .nav-item svg { width: 24px; height: 24px; margin-bottom: 4px; fill: #8e8e93; }
        .nav-item span { font-size: 10px; font-weight: 700; }
        .nav-item.active { color: var(--apple-red); }
        .nav-item.active svg { fill: var(--apple-red); }

        /* CONTADOR AMARELO NO BOTÃO DA BIBLIOTECA */
        #badge-favs {
            position: absolute; top: -5px; right: 15%; background: var(--yellow);
            color: #000; font-size: 10px; font-weight: 900; min-width: 18px; height: 18px;
            border-radius: 10px; display: none; align-items: center; justify-content: center;
        }

        .dock-play-btn {
            width: 55px; height: 55px; background: rgba(255,255,255,0.1);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }

        #player-view {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 900; display: none; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .player-art { width: 80%; aspect-ratio: 1/1; border-radius: 20px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="home-screen">
        <header id="main-title">Rádios</header>
        <div class="section-title">Explorar</div>
        <div id="main-grid" class="main-grid"></div>
    </div>

    <div id="player-view">
        <img id="p-art" class="player-art">
        <h2 id="p-name">Nome da Rádio</h2>
    </div>

    <div class="apple-dock">
        <div class="nav-item active" id="nav-home" onclick="tab('home')">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>Início</span>
        </div>

        <div class="nav-item" id="nav-lib" onclick="tab('lib')">
            <div id="badge-favs">0</div>
            <svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9H9V9h10v2zm-4 4H9v-2h6v2zm4-8H9V5h10v2z"/></svg>
            <span>Biblioteca</span>
        </div>

        <div class="dock-play-btn" onclick="togglePlay()">
            <svg viewBox="0 0 24 24" width="28"><path id="dock-icon" fill="white" d="M8 5v14l11-7z"/></svg>
        </div>

        <div class="nav-item" id="nav-search" onclick="tab('search')">
            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <span>Busca</span>
        </div>
    </div>

    <audio id="main-audio"></audio>

    <script>
        // Funções de favoritos, player e navegação preservadas e corrigidas
        let favorites = JSON.parse(localStorage.getItem('lamonie_favs')) || [];
        
        function updateUI() {
            const badge = document.getElementById('badge-favs');
            badge.innerText = favorites.length;
            badge.style.display = favorites.length > 0 ? 'flex' : 'none';
        }

        // ... resto da lógica de carregar rádios e tocar permanece igual ...
        
        updateUI();
    </script>
</body>
</html>
