<style>
    /* Estilo Premium e Correção de Visibilidade */
    .content-section {
        display: none; /* Esconde todas as seções por padrão */
    }

    .content-section.active {
        display: block; /* Mostra apenas a seção marcada como ativa */
    }

    /* Ajuste para a Biblioteca mostrar 2 itens por linha conforme sua regra */
    .album-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr); 
        gap: 15px;
        padding: 10px;
    }

    /* Garante que a barra de navegação esteja sempre no topo (Z-INDEX) */
    .bottom-nav {
        position: fixed;
        bottom: 0;
        width: 100%;
        z-index: 9999 !important; /* Força ficar acima de qualquer capa de álbum */
        background: rgba(15, 15, 15, 0.85);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Cor do botão quando acionado */
    .nav-item.active {
        color: #ff4b4b !important;
    }

    /* Estrela de favoritos */
    .star-icon.favorited {
        color: #ffcc00 !important;
    }
</style>

<script>
    // FUNÇÃO PARA TROCAR DE TELA (INÍCIO / BIBLIOTECA / BUSCA)
    function showSection(sectionId, element) {
        // 1. Remove a classe 'active' de todas as seções de conteúdo
        document.querySelectorAll('.content-section').forEach(section => {
            section.classList.remove('active');
        });

        // 2. Mostra a seção correta
        const targetSection = document.getElementById(sectionId);
        if (targetSection) {
            targetSection.classList.add('active');
        }

        // 3. Atualiza o estado visual dos botões na barra inferior
        document.querySelectorAll('.nav-item').forEach(item => {
            item.classList.remove('active');
        });
        element.classList.add('active');
        
        // Rola para o topo ao trocar de aba
        window.scrollTo(0, 0);
    }

    // FUNÇÃO PARA FAVORITAR (ESTRELINHA)
    function toggleFavorite(event, starElement) {
        event.stopPropagation(); // Impede de abrir a rádio ao clicar na estrela
        starElement.classList.toggle('favorited');
        
        if (starElement.classList.contains('favorited')) {
            console.log("Adicionado aos favoritos");
            // Aqui você pode adicionar a lógica para salvar no banco ou localstorage
        }
    }

    // GARANTE QUE A BARRA NÃO SUMA AO CLICAR NA CAPA
    function openPlayer() {
        // Sua lógica de abrir o álbum aqui...
        // Importante: Não esconda o elemento '.bottom-nav' aqui.
        document.querySelector('.bottom-nav').style.display = 'flex';
    }
</script>
