<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIE MUSIC PRO</title>
    <style>
        :root {
            --orange: #ff8c00;
            --ios-red: #ff3b30;
            --glass: rgba(28, 28, 30, 0.85);
            --border: 0.5px solid #ff8c00;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background: #000; color: white; overflow: hidden; height: 100vh; }

        /* HEADER IGUAL AO PRINT */
        header { padding: 50px 20px 10px; }
        header h1 { font-size: 34px; font-weight: 800; color: var(--orange); }

        /* GRADE FIXA 3 COLUNAS - NÃO FICA BOBA */
        #main-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 20px;
            height: 65vh;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .radio-box {
            aspect-ratio: 1/1;
            background: #1c1c1e;
            border-radius: 15px;
            overflow: hidden;
            border: 0.5px solid #333;
            position: relative;
        }
        .radio-box img { width: 100%; height: 100%; object-fit: cover; }

        /* PLAYER DE VIDRO BRILHANTE (ESTILO IOS 26.4) */
        #player-dock {
            position: fixed; bottom: 100px; left: 15px; right: 15px;
            height: 70px; background: var(--glass); backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px); border-radius: 18px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; border: var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .info-play { display: flex; align-items: center; gap: 12px; }
        .art-play { width: 48px; height: 48px; border-radius: 8px; background: #333; }
        
        /* BOTÕES DE COMANDO (IGUAL DA IMAGEM) */
        .controls { display: flex; gap: 20px; }
        .btn-cmd { background: none; border: none; color: white; font-size: 22px; cursor: pointer; }

        /* TAB BAR - BOTÕES CÁPSULA DE VIDRO */
        .tab-bar {
            position: fixed; bottom: 20px; left: 15px; right: 15px;
            display: flex; gap: 10px; align-items: center; height: 60px;
        }

        .tab-btn {
            flex: 1; height: 50px; background: var(--glass);
            backdrop-filter: blur(20px); border-radius: 25px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 600; border: var(--border); color: #fff;
        }

        .tab-btn.active { background: rgba(255, 59, 48, 0.15); border-color: var(--ios-red); color: var(--ios-red); }

        /* BOTÃO BUSCA REDONDO */
        .search-btn {
            width: 60px; height: 60px; background: #1c1c1e;
            border-radius: 50%; border: var(--border);
            display: flex; align-items: center; justify-content: center; font-size: 20px;
        }

        #player-dock.hidden { display: none; }
    </style>
</head>
<body>

    <header><h1>Rádio</h1></header>

    <div id="main-grid">
        </div>

    <div id="player-dock" class="hidden">
        <div class="info-play">
            <img id="track-art" class="art-play">
            <div>
                <div id="track-name" style="font-size: 14px; font-weight: bold;">Body to Body</div>
                <div id="track-artist" style="font-size: 11px; color: #aaa;">BTS</div>
            </div>
        </div>
        <div class="controls">
            <button class="btn-cmd" onclick="audio.toggle()">⏸️</button>
            <button class="btn-cmd">⏩</button>
        </div>
    </div>

    <nav class="tab-bar">
        <div class="tab-btn">Início</div>
        <div class="tab-btn">Rádio</div>
        <div class="tab-btn active">Biblioteca</div>
        <div class="search-btn">🔍</div>
    </nav>

    <audio id="audio-engine"></audio>

    <script>
        const audio = {
            current: null,
            init: async () => {
                const res = await fetch('https://de1.api.radio-browser.info/json/stations/search?country=Brazil&limit=100&hidebroken=true&order=clickcount&reverse=true');
                const data = await res.json();
                const grid = document.getElementById('main-grid');
                data.forEach(r => {
                    const box = document.createElement('div');
                    box.className = 'radio-box';
                    box.onclick = () => audio.play(r);
                    box.innerHTML = `<img src="${r.favicon || 'https://via.placeholder.com/150/1c1c1e/white?text=LAMONIE'}">`;
                    grid.appendChild(box);
                });
            },
            play: (r) => {
                const player = document.getElementById('audio-engine');
                const dock = document.getElementById('player-dock');
                player.src = r.url_resolved;
                player.play();
                document.getElementById('track-art').src = r.favicon || '';
                document.getElementById('track-name').innerText = r.name;
                document.getElementById('track-artist').innerText = "Ao Vivo";
                dock.classList.remove('hidden');
            },
            toggle: () => {
                const p = document.getElementById('audio-engine');
                p.paused ? p.play() : p.pause();
            }
        };
        audio.init();
    </script>
</body>
</html>
