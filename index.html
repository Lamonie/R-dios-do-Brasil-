<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lamoniê Flow - Premium</title>
    <style>
        :root { 
            --bg: #000; 
            --apple-red: #ff2d55;
            --glass: rgba(28, 28, 30, 0.85);
            --glass-border: rgba(255, 255, 255, 0.1);
            --yellow: #FFD700;
        }
        
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; overflow-x: hidden; width: 100vw; }

        /* HEADER E MAIS OUVIDAS - FIXO NO TOPO */
        .topo-fixo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 500;
            background: var(--bg);
            /* Removida a sombra pesada que cobria o nome Destaques */
            border-bottom: 0.5px solid var(--glass-border);
        }

        header { padding: 50px 20px 10px; font-size: 32px; font-weight: 800; }

        /* PADRÃO ÚNICO DE TAMANHO PARA TODOS OS CARROSSEIS (95px) */
        .section-container { margin-bottom: 25px; width: 100%; }
        .section-title { padding: 0 20px 12px; font-size: 18px; font-weight: 700; color: #fff; }
        
        .horizontal-scroll { 
            display: flex; overflow-x: auto; gap: 12px; padding: 0 20px 10px; 
            scrollbar-width: none; 
        }
        .horizontal-scroll::-webkit-scrollbar { display: none; }

        .card { 
            width: 95px; min-width: 95px; background: #1c1c1e; border-radius: 12px; 
            overflow: hidden; border: 0.5px solid #333; position: relative; flex-shrink: 0;
        }
        .card-img { width: 95px; height: 95px; object-fit: cover; display: block; background: #2c2c2e; }
        .card-info { padding: 6px 4px; font-size: 10px; font-weight: 600; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- AJUSTE DO PUXÃO: DEIXA O NOME "DESTAQUES" LIVRE --- */
        #main-content-scroll { 
            padding-top: 255px; /* Espaço exato para o bloco fixo não cobrir o texto */
            padding-bottom: 120px;
        }

        /* DOCK */
        .apple-dock { position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; height: 75px; z-index: 1000; background: var(--glass); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border-radius: 38px; border: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: space-around; }
        .nav-item { display: flex; flex-direction: column; align-items: center; flex: 1; color: #8e8e93; font-size: 10px; font-weight: 700; }
        .nav-item svg { width: 24px; height: 24px; margin-bottom: 4px; fill: #8e8e93; }
        .nav-item.active { color: var(--apple-red); }
        .nav-item.active svg { fill: var(--apple-red); }
        
        .dock-play-btn { width: 58px; height: 58px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        #dock-thumb { position: absolute; width: 100%; height: 100%; object-fit: cover; display: none; }
    </style>
</head>
<body>

    <div class="topo-fixo">
        <header>Rádios</header>
        <div id="container-mais-ouvidas"></div>
    </div>

    <div id="main-content-scroll">
        <div id="carousels-area"></div>
        <div id="grid-area">
            <div class="section-title">Explorar Todas</div>
            <div id="master-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(95px, 1fr)); gap: 12px; padding: 0 20px;"></div>
        </div>
    </div>

    <div class="apple-dock">
        <div class="nav-item active">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>INÍCIO</span>
        </div>
        <div class="dock-play-btn" onclick="togglePlayback()">
            <img id="dock-thumb" src="">
            <svg viewBox="0 0 24 24" width="30"><path id="play-icon" fill="white" d="M8 5v14l11-7z"/></svg>
        </div>
        <div class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5z"/></svg>
            <span>BUSCA</span>
        </div>
    </div>

    <audio id="audio-engine"></audio>

    <script>
        const audio = document.getElementById('audio-engine');
        const carouselsArea = document.getElementById('carousels-area');
        const masterGrid = document.getElementById('master-grid');
        const topoMaisOuvidas = document.getElementById('container-mais-ouvidas');

        async function startApp() {
            try {
                const res = await fetch('https://de1.api.radio-browser.info/json/stations/search?country=Brazil&limit=60&hidebroken=true&order=clickcount&reverse=true');
                const data = await res.json();
                
                // Mais Ouvidas - Fica no topo fixo
                renderCarousel("Mais Ouvidas", data.slice(0, 15), topoMaisOuvidas);
                // Destaques - Aparece logo abaixo ao rolar
                renderCarousel("Destaques", data.slice(15, 30), carouselsArea);
                // Grid Restante
                data.slice(30).forEach(r => masterGrid.appendChild(createCard(r)));
            } catch (e) { console.error(e); }
        }

        function renderCarousel(title, list, container) {
            const section = document.createElement('div');
            section.className = 'section-container';
            section.innerHTML = `<div class="section-title">${title}</div><div class="horizontal-scroll"></div>`;
            const scroll = section.querySelector('.horizontal-scroll');
            list.forEach(r => scroll.appendChild(createCard(r)));
            container.appendChild(section);
        }

        function createCard(radio) {
            const el = document.createElement('div');
            el.className = 'card';
            el.onclick = () => playRadio(radio);
            el.innerHTML = `
                <img class="card-img" src="${radio.favicon || 'https://via.placeholder.com/95/2c2c2e/fff?text=Radio'}">
                <div class="card-info">${radio.name}</div>
            `;
            return el;
        }

        function playRadio(radio) {
            audio.src = radio.url_resolved;
            audio.play();
            const dockThumb = document.getElementById('dock-thumb');
            dockThumb.src = radio.favicon || '';
            dockThumb.style.display = 'block';
            updateIcon(true);
        }

        function togglePlayback() {
            if(audio.paused) { audio.play(); updateIcon(true); }
            else { audio.pause(); updateIcon(false); }
        }

        function updateIcon(p) { document.getElementById('play-icon').setAttribute('d', p ? "M6 19h4V5H6v14zm8-14v14h4V5h-4z" : "M8 5v14l11-7z"); }

        startApp();
    </script>
</body>
</html>
