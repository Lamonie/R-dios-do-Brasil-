<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lamoniê Flow - Premium</title>
    <style>
        :root { --bg: #000; --glass: rgba(28, 28, 30, 0.85); --accent: #ff2d55; --blur: blur(25px); }
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: white; padding-bottom: 140px; }

        /* HEADER */
        header { padding: 60px 20px 10px; font-size: 32px; font-weight: 800; }
        .section-title { padding: 20px 20px 10px; color: #007AFF; font-size: 13px; font-weight: 700; text-transform: uppercase; }

        /* GRID (2 COLUNAS) */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; }
        .card { background: #1c1c1e; border-radius: 18px; overflow: hidden; position: relative; border: 0.5px solid #333; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .card-name { padding: 8px; text-align: center; font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* ESTRELA DE FAVORITO */
        .star-box { 
            position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.6); 
            width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px;
        }

        /* TELA DE DETALHES */
        #player-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 9000; display: none; flex-direction: column; align-items: center; padding-top: 80px;
        }
        .big-art { width: 80%; border-radius: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); margin-bottom: 30px; }

        /* BOTÕES IGUAIS ÀS FOTOS QUE VOCÊ MANDOU */
        .apple-btn {
            background: #1c1c1e; border-radius: 50%; width: 60px; height: 60px;
            display: flex; align-items: center; justify-content: center; border: 0.5px solid #333;
        }
        .play-pause-big { font-size: 30px; margin-top: 40px; cursor: pointer; }

        /* BARRA DE NAVEGAÇÃO PREMIUM */
        .tab-bar {
            position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%);
            width: 92%; height: 75px; background: var(--glass); backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur); border-radius: 40px; border: 0.5px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: space-between; padding: 0 10px; z-index: 10000;
        }
        .nav-group { display: flex; background: rgba(255,255,255,0.05); border-radius: 35px; height: 60px; flex: 1; margin-right: 10px; align-items: center; justify-content: space-around; }
        .nav-item { text-align: center; color: #888; font-size: 10px; font-weight: 600; }
        .nav-item.active { color: white; }
        .nav-item img { width: 24px; height: 24px; display: block; margin: 0 auto 4px; filter: grayscale(1); }
        .nav-item.active img { filter: none; }

        /* BOTÃO DE BUSCA CIRCULAR (FOTO 7850) */
        .search-circle-btn {
            width: 60px; height: 60px; background: #1c1c1e; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; border: 0.5px solid #333;
        }
    </style>
</head>
<body>

    <header id="page-title">Rádios</header>

    <div id="home-content">
        <div class="section-title" id="sec-title">Rádios do Brasil</div>
        <div class="grid" id="main-grid"></div>
    </div>

    <div id="player-page">
        <div onclick="closeRadio()" style="position:absolute; top:40px; left:25px; font-weight:700;">✕ Fechar</div>
        <img id="p-img" class="big-art" src="">
        <div style="text-align:center; padding: 0 30px;">
            <h2 id="p-title">Nome da Rádio</h2>
            <p id="p-loc" style="color:#888; margin-top:10px;">Localização</p>
        </div>
        <div class="apple-btn play-pause-big" onclick="togglePlayback()" id="p-btn">▶️</div>
    </div>

    <div class="tab-bar">
        <div class="nav-group">
            <div class="nav-item active" id="btn-inicio" onclick="goHome()">
                <div style="font-size:24px;">🏠</div>Início
            </div>
            <div class="nav-item" id="btn-bib" onclick="goLibrary()">
                <div style="font-size:24px;">📋</div>Biblioteca
            </div>
        </div>
        <div class="search-circle-btn" onclick="openSearch()">🔍</div>
    </div>

    <audio id="radio-engine"></audio>

    <script>
        let radios = [];
        let favs = JSON.parse(localStorage.getItem('lamonie_favs')) || [];
        const engine = document.getElementById('radio-engine');

        async function initApp() {
            const r = await fetch('https://de1.api.radio-browser.info/json/stations/search?country=Brazil&limit=60&hidebroken=true&order=clickcount&reverse=true');
            radios = await r.json();
            render(radios);
        }

        function render(data) {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';
            data.forEach(item => {
                const isSaved = favs.some(f => f.changeuuid === item.changeuuid);
                grid.innerHTML += `
                    <div class="card" onclick="playRadio('${item.changeuuid}')">
                        <div class="star-box" onclick="event.stopPropagation(); toggleFav('${item.changeuuid}')">
                            ${isSaved ? '⭐' : '☆'}
                        </div>
                        <img src="${item.favicon || 'https://via.placeholder.com/200/1c1c1e/white?text=RADIO'}">
                        <div class="card-name">${item.name}</div>
                    </div>
                `;
            });
        }

        function playRadio(id) {
            const radio = radios.find(x => x.changeuuid === id) || favs.find(x => x.changeuuid === id);
            document.getElementById('p-img').src = radio.favicon || '';
            document.getElementById('p-title').innerText = radio.name;
            document.getElementById('p-loc').innerText = radio.state || 'Brasil';
            engine.src = radio.url_resolved;
            engine.play();
            document.getElementById('p-btn').innerText = '⏸️';
            document.getElementById('player-page').style.display = 'flex';
        }

        function togglePlayback() {
            if(engine.paused) { engine.play(); document.getElementById('p-btn').innerText = '⏸️'; }
            else { engine.pause(); document.getElementById('p-btn').innerText = '▶️'; }
        }

        function closeRadio() { document.getElementById('player-page').style.display = 'none'; }

        function toggleFav(id) {
            const radio = radios.find(x => x.changeuuid === id);
            const idx = favs.findIndex(f => f.changeuuid === id);
            if(idx > -1) favs.splice(idx, 1);
            else favs.push(radio);
            localStorage.setItem('lamonie_favs', JSON.stringify(favs));
            render(radios);
        }

        // CORREÇÃO: VOLTAR PARA O INÍCIO LIMPANDO TUDO
        function goHome() {
            document.getElementById('btn-inicio').classList.add('active');
            document.getElementById('btn-bib').classList.remove('active');
            document.getElementById('page-title').innerText = "Rádios";
            document.getElementById('sec-title').innerText = "Rádios do Brasil";
            render(radios); // Volta a mostrar todas as rádios
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function goLibrary() {
            document.getElementById('btn-bib').classList.add('active');
            document.getElementById('btn-inicio').classList.remove('active');
            document.getElementById('page-title').innerText = "Biblioteca";
            document.getElementById('sec-title').innerText = "Suas Favoritas";
            render(favs); // Mostra só as favoritadas
        }

        function openSearch() {
            const term = prompt("Digite o nome da rádio:");
            if(term) {
                const filtered = radios.filter(r => r.name.toLowerCase().includes(term.toLowerCase()));
                render(filtered);
            }
        }

        initApp();
    </script>
</body>
</html>
