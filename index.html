<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIE MUSIC PRO</title>
    <style>
        :root {
            --orange: #ff8c00;
            --ios-red: #ff3b30;
            --glass: rgba(30, 30, 30, 0.75);
            --border: 0.5px solid var(--orange);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: white; font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh; }

        /* HEADER */
        header { padding: 60px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 34px; font-weight: 800; color: var(--orange); }

        /* CARROSSEL DE QUADRADOS (IGUAL APPLE MUSIC) */
        .section-label { padding: 20px; font-size: 20px; font-weight: 700; color: white; }
        .carousel {
            display: flex; overflow-x: auto; gap: 15px; padding: 0 20px 20px;
            scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
        }
        .carousel::-webkit-scrollbar { display: none; }
        
        .radio-card { min-width: 145px; scroll-snap-align: start; cursor: pointer; }
        .thumb { 
            width: 145px; height: 145px; background: #1c1c1e; border-radius: 12px; 
            margin-bottom: 8px; border: 0.5px solid #333; overflow: hidden;
        }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }
        .radio-n { font-size: 12px; font-weight: 500; text-align: center; color: #eee; }

        /* --- BARRA DE PLAY (CÁPSULA DE VIDRO IGUAL DA IMAGEM) --- */
        #player-bar {
            position: fixed; bottom: 105px; left: 15px; right: 15px;
            height: 65px; background: var(--glass); backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px); border-radius: 15px;
            display: none; align-items: center; justify-content: space-between;
            padding: 0 15px; border: var(--border); z-index: 2000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .p-info { display: flex; align-items: center; gap: 12px; max-width: 65%; }
        .p-art { width: 45px; height: 45px; border-radius: 8px; background: #333; }
        .p-txt { overflow: hidden; }
        .p-name { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .p-controls { display: flex; gap: 20px; font-size: 22px; }

        /* --- NAV BAR (BOTÕES AVANÇADOS IGUAL APPLE MUSIC) --- */
        .tab-nav {
            position: fixed; bottom: 25px; left: 15px; right: 85px;
            height: 60px; display: flex; gap: 10px; z-index: 1000;
        }
        .glass-btn {
            flex: 1; height: 100%; background: var(--glass); backdrop-filter: blur(25px);
            border-radius: 30px; border: var(--border); display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 600; color: #fff; cursor: pointer;
        }
        .tab-active { color: var(--ios-red); border-color: var(--ios-red); background: rgba(255,59,48,0.15); }

        .search-circle {
            position: fixed; bottom: 25px; right: 15px;
            width: 60px; height: 60px; background: #1c1c1e;
            border-radius: 50%; border: var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; z-index: 1000; cursor: pointer;
        }
    </style>
</head>
<body>

    <header><h1>Rádio</h1></header>

    <div id="content-scroll" style="height: 70vh; overflow-y: auto;">
        <div class="section-label">Sugestões de Forró</div>
        <div id="forro-list" class="carousel"></div>

        <div class="section-label">Gospel e Mais</div>
        <div id="gospel-list" class="carousel"></div>
    </div>

    <div id="player-bar">
        <div class="p-info">
            <img id="p-img" class="p-art">
            <div class="p-txt">
                <div id="p-title" class="p-name">Selecione uma rádio</div>
                <div style="font-size: 11px; color: var(--orange);">Ao Vivo</div>
            </div>
        </div>
        <div class="p-controls">
            <span onclick="audio.toggle()" id="play-btn">⏸️</span>
            <span>⏩</span>
        </div>
    </div>

    <nav class="tab-nav">
        <div class="glass-btn" onclick="location.reload()"><div>🏠</div>Início</div>
        <div class="glass-btn"><div>📻</div>Rádio</div>
        <div class="glass-btn tab-active"><div>📋</div>Biblioteca</div>
    </nav>
    <div class="search-circle" onclick="alert('Busca Ativada')">🔍</div>

    <audio id="engine" crossorigin="anonymous"></audio>

    <script>
        const audio = {
            init: async () => {
                const fetchR = async (tag, id) => {
                    const res = await fetch(`https://de1.api.radio-browser.info/json/stations/search?${tag}&limit=15&hidebroken=true&order=clickcount&reverse=true`);
                    const data = await res.json();
                    const el = document.getElementById(id);
                    data.forEach(r => {
                        const card = document.createElement('div');
                        card.className = 'radio-card';
                        card.onclick = () => audio.play(r);
                        card.innerHTML = `<div class="thumb"><img src="${r.favicon || 'https://via.placeholder.com/150/1c1c1e/white?text=RADIO'}"></div><div class="radio-n">${r.name}</div>`;
                        el.appendChild(card);
                    });
                };
                fetchR("tag=forro", "forro-list");
                fetchR("tag=gospel", "gospel-list");
            },
            play: (r) => {
                const player = document.getElementById('engine');
                const bar = document.getElementById('player-bar');
                player.src = r.url_resolved;
                player.play();
                document.getElementById('p-img').src = r.favicon;
                document.getElementById('p-title').innerText = r.name;
                bar.style.display = 'flex';
                document.getElementById('play-btn').innerText = "⏸️";
            },
            toggle: () => {
                const p = document.getElementById('engine');
                const b = document.getElementById('play-btn');
                p.paused ? (p.play(), b.innerText = "⏸️") : (p.pause(), b.innerText = "▶️");
            }
        };
        audio.init();
    </script>
</body>
</html>
