<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lamoniê Flow</title>
    <style>
        :root { 
            --bg: #000; 
            --apple-red: #ff2d55;
            --glass: rgba(30, 30, 30, 0.75);
            --glass-border: rgba(255, 255, 255, 0.15);
        }
        
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: white; padding-bottom: 120px; overflow-x: hidden; }

        header { padding: 50px 20px 10px; font-size: 32px; font-weight: 800; }

        /* GRID DE RÁDIOS */
        .main-grid { 
            display: grid; grid-template-columns: 1fr 1fr; 
            gap: 15px; padding: 0 20px; 
        }
        .card { 
            background: #1c1c1e; border-radius: 12px; overflow: hidden; 
            border: 0.5px solid #333; position: relative; 
        }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; background: #2c2c2e; }
        .card-info { padding: 10px; font-size: 12px; font-weight: 600; text-align: center; }

        /* PÁGINA DE DETALHES (PLAYER) */
        #player-view {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 900; display: none; 
            flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; text-align: center;
        }
        .full-art { width: 85%; max-width: 320px; aspect-ratio: 1/1; border-radius: 20px; object-fit: cover; box-shadow: 0 20px 40px rgba(0,0,0,0.6); margin-bottom: 25px; }

        /* BARRA DE NAVEGAÇÃO ESTILO APPLE (FIXA) */
        .nav-container {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 500px; height: 70px; z-index: 1000; /* Z-INDEX ALTO PARA SEMPRE APARECER */
            background: var(--glass); backdrop-filter: blur(25px) saturate(180%); -webkit-backdrop-filter: blur(25px) saturate(180%);
            border-radius: 35px; border: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: space-around;
        }

        .nav-item { display: flex; flex-direction: column; align-items: center; flex: 1; color: #888; cursor: pointer; }
        .nav-item svg { width: 22px; height: 22px; margin-bottom: 4px; fill: #888; transition: 0.3s; }
        .nav-item span { font-size: 10px; font-weight: 700; }
        
        /* ESTADO ATIVO */
        .nav-item.active { color: var(--apple-red); }
        .nav-item.active svg { fill: var(--apple-red); }

        /* BOTÃO DE PLAY NA BARRA */
        .dock-play {
            width: 50px; height: 50px; background: rgba(255,255,255,0.1);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }

        #loader { text-align: center; padding: 20px; color: var(--apple-red); }
    </style>
</head>
<body>

    <div id="content-screen">
        <header id="title">Rádios</header>
        <div id="main-grid" class="main-grid"></div>
        <div id="loader">Carregando rádios...</div>
    </div>

    <div id="player-view">
        <img id="player-art" class="full-art">
        <h2 id="player-name">Nome da Rádio</h2>
        <p id="player-loc" style="color: #666; margin-top: 8px;">Localização</p>
    </div>

    <div class="nav-container">
        <div class="nav-item active" id="btn-home" onclick="changeTab('home')">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>INÍCIO</span>
        </div>
        
        <div class="nav-item" id="btn-lib" onclick="changeTab('lib')">
            <svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9H9V9h10v2zm-4 4H9v-2h6v2zm4-8H9V5h10v2z"/></svg>
            <span>MÚSICA</span>
        </div>

        <div class="dock-play" onclick="togglePlay()">
            <svg viewBox="0 0 24 24" width="24"><path id="play-icon" fill="white" d="M8 5v14l11-7z"/></svg>
        </div>

        <div class="nav-item" id="btn-search" onclick="changeTab('search')">
            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <span>BUSCA</span>
        </div>
    </div>

    <audio id="radio-audio"></audio>

    <script>
        const audio = document.getElementById('radio-audio');
        const grid = document.getElementById('main-grid');
        let radioList = [];

        // BUSCAR RÁDIOS
        async function loadRadios() {
            try {
                const res = await fetch('https://de1.api.radio-browser.info/json/stations/search?country=Brazil&limit=60&hidebroken=true&order=clickcount&reverse=true');
                radioList = await res.json();
                grid.innerHTML = '';
                radioList.forEach(radio => {
                    const img = radio.favicon || 'https://via.placeholder.com/150/2c2c2e/fff?text=Radio';
                    grid.innerHTML += `
                        <div class="card" onclick="playRadio('${radio.stationuuid}')">
                            <img src="${img}" loading="lazy">
                            <div class="card-info">${radio.name}</div>
                        </div>
                    `;
                });
                document.getElementById('loader').style.display = 'none';
            } catch (e) { console.error("Erro ao carregar"); }
        }

        // TOCA A RÁDIO E ABRE A CAPA SEM SUMIR COM A BARRA
        function playRadio(uuid) {
            const radio = radioList.find(r => r.stationuuid === uuid);
            if(!radio) return;

            document.getElementById('player-art').src = radio.favicon || 'https://via.placeholder.com/300/2c2c2e/fff?text=Radio';
            document.getElementById('player-name').innerText = radio.name;
            document.getElementById('player-loc').innerText = radio.state || "Brasil";
            
            // Abre a tela de detalhes
            document.getElementById('player-view').style.display = 'flex';
            document.getElementById('content-screen').style.display = 'none';

            if(audio.src !== radio.url_resolved) {
                audio.src = radio.url_resolved;
                audio.play();
                setPlayIcon(true);
            }
        }

        function togglePlay() {
            if(!audio.src) return;
            if(audio.paused) { audio.play(); setPlayIcon(true); }
            else { audio.pause(); setPlayIcon(false); }
        }

        function setPlayIcon(isPlaying) {
            const icon = document.getElementById('play-icon');
            icon.setAttribute('d', isPlaying ? "M6 19h4V5H6v14zm8-14v14h4V5h-4z" : "M8 5v14l11-7z");
        }

        // NAVEGAÇÃO ENTRE ABAS
        function changeTab(tab) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('btn-' + tab).classList.add('active');

            if(tab === 'home') {
                document.getElementById('player-view').style.display = 'none';
                document.getElementById('content-screen').style.display = 'block';
                document.getElementById('title').innerText = "Rádios";
            }
            if(tab === 'search') {
                const s = prompt("Buscar rádio:");
                if(s) { /* Lógica de busca aqui */ }
            }
        }

        loadRadios();
    </script>
</body>
</html>
