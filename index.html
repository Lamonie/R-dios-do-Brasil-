<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lamonie Radio PRO</title>
    <style>
        :root { --bg: #000000; --accent: #ff2d55; --orange: #ff8c00; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        
        body { background: var(--bg); color: white; padding-bottom: 150px; min-height: 100vh; overflow-x: hidden; }
        
        header { padding: 50px 20px 20px; text-align: left; }
        header h1 { font-size: 34px; font-weight: 800; color: white; }

        .section { margin-bottom: 30px; }
        .section-header { padding: 0 20px 12px; color: #007AFF; font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

        .carousel { display: flex; overflow-x: auto; gap: 16px; padding: 0 20px 20px; scroll-behavior: smooth; }
        .carousel::-webkit-scrollbar { display: none; }

        .radio-card { min-width: 140px; cursor: pointer; }
        .thumb { width: 140px; height: 140px; border-radius: 12px; overflow: hidden; background: #1a1a1a; margin-bottom: 8px; border: 0.5px solid #333; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }
        .radio-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- NOVA BARRA DE PLAYER (CÁPSULA DE VIDRO) --- */
        .bottom-player {
            position: fixed; bottom: 100px; left: 12px; right: 12px;
            height: 64px; background: rgba(30, 30, 30, 0.85); backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px); border-radius: 18px;
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            display: none; align-items: center; justify-content: space-between;
            padding: 0 15px; z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .bottom-player.show { display: flex; }
        .p-info { display: flex; align-items: center; gap: 10px; max-width: 70%; }
        .p-info img { width: 44px; height: 44px; border-radius: 8px; }
        .p-text { overflow: hidden; }
        .p-title { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .p-controls { display: flex; gap: 18px; }
        .icon-btn { width: 28px; height: 28px; cursor: pointer; }

        /* --- NOVA TAB BAR (BOTÕES DAS IMAGENS) --- */
        .tab-bar-container {
            position: fixed; bottom: 25px; left: 0; width: 100%;
            display: flex; justify-content: center; align-items: center;
            gap: 10px; padding: 0 15px; z-index: 2000;
        }

        .main-nav {
            background: rgba(25, 25, 25, 0.9); backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px); border-radius: 35px;
            border: 0.5px solid #333; height: 65px; flex: 1;
            display: flex; align-items: center; justify-content: space-around;
            padding: 0 10px;
        }

        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; flex: 1; }
        .nav-item img { width: 26px; height: 26px; object-fit: contain; }
        .nav-item span { font-size: 10px; font-weight: 600; color: #fff; }
        
        /* Destaque para Biblioteca conforme imagem */
        .nav-item.active { 
            background: rgba(255, 45, 85, 0.15); 
            border-radius: 25px; height: 50px; justify-content: center;
            color: #ff2d55;
        }
        .nav-item.active span { color: #ff2d55; }

        .search-circle {
            width: 65px; height: 65px; background: rgba(25, 25, 25, 0.9);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: 50%; border: 0.5px solid #333;
            display: flex; align-items: center; justify-content: center;
        }
        .search-circle img { width: 26px; height: 26px; }

        /* Modal */
        #details-modal {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.98); z-index: 3000;
            display: none; align-items: center; justify-content: center;
        }
        .modal-content { text-align: center; padding: 20px; width: 100%; }
        .big-img { width: 280px; height: 280px; border-radius: 20px; margin-bottom: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
    </style>
</head>
<body>

    <header><h1>Rádios</h1></header>

    <div id="content">
        <div class="section"><div class="section-header">TOP 15 BRASIL</div><div id="top-carousel" class="carousel"></div></div>
        <div class="section"><div class="section-header">FORRÓ SUGERIDAS</div><div id="forro-carousel" class="carousel"></div></div>
        <div class="section"><div class="section-header">SERTANEJO SUGERIDAS</div><div id="sertanejo-carousel" class="carousel"></div></div>
    </div>

    <div class="bottom-player" id="bottom-bar">
        <div class="p-info" onclick="app.showDetails()">
            <img id="bar-logo" src="">
            <div class="p-text">
                <div id="bar-title" class="p-title">Selecione uma rádio</div>
                <div style="font-size: 11px; color: var(--orange);">Ao Vivo</div>
            </div>
        </div>
        <div class="p-controls">
            <img id="btn-play-icon" src="https://cdn-icons-png.flaticon.com/512/175/175681.png" class="icon-btn" style="filter:invert(1)" onclick="app.togglePlay()">
            <img src="https://cdn-icons-png.flaticon.com/512/175/175683.png" class="icon-btn" style="filter:invert(1)">
        </div>
    </div>

    <div class="tab-bar-container">
        <nav class="main-nav">
            <div class="nav-item" onclick="location.reload()">
                <img src="https://cdn-icons-png.flaticon.com/512/1946/1946488.png" style="filter:invert(1)">
                <span>Início</span>
            </div>
            <div class="nav-item">
                <img src="https://cdn-icons-png.flaticon.com/512/1384/1384061.png" style="filter:invert(1)">
                <span>Rádio</span>
            </div>
            <div class="nav-item active">
                <img src="https://cdn-icons-png.flaticon.com/512/3503/3503813.png" style="filter:hue-rotate(300deg)">
                <span>Biblioteca</span>
            </div>
        </nav>
        <div class="search-circle">
            <img src="https://cdn-icons-png.flaticon.com/512/54/54481.png" style="filter:invert(1)">
        </div>
    </div>

    <div id="details-modal">
        <div class="modal-content">
            <img id="m-img" class="big-img">
            <h2 id="m-title" style="font-size: 24px; margin-bottom: 10px;"></h2>
            <p id="m-loc" style="color: var(--orange); margin-bottom: 30px;"></p>
            <button onclick="app.closeDetails()" style="background:#333; color:white; border:none; padding:15px 40px; border-radius:25px; font-weight:700;">FECHAR</button>
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        const app = {
            audio: document.getElementById('audio-player'),
            currentRadio: null,

            fetchRadios: async function(params, containerId) {
                const container = document.getElementById(containerId);
                const response = await fetch(`https://de1.api.radio-browser.info/json/stations/search?${params}&hidebroken=true&limit=10`);
                const data = await response.json();
                data.forEach(radio => {
                    const card = document.createElement('div');
                    card.className = 'radio-card';
                    card.onclick = () => this.playRadio(radio);
                    card.innerHTML = `
                        <div class="thumb"><img src="${radio.favicon || 'https://via.placeholder.com/140/222/fff?text=RADIO'}"></div>
                        <div class="radio-name">${radio.name}</div>
                    `;
                    container.appendChild(card);
                });
            },

            playRadio: function(radio) {
                this.currentRadio = radio;
                this.audio.src = radio.url_resolved;
                this.audio.play();
                document.getElementById('bottom-bar').classList.add('show');
                document.getElementById('bar-logo').src = radio.favicon || '';
                document.getElementById('bar-title').innerText = radio.name;
                document.getElementById('btn-play-icon').src = "https://cdn-icons-png.flaticon.com/512/175/175681.png"; // Pausa
            },

            togglePlay: function() {
                if (this.audio.paused) {
                    this.audio.play();
                    document.getElementById('btn-play-icon').src = "https://cdn-icons-png.flaticon.com/512/175/175681.png";
                } else {
                    this.audio.pause();
                    document.getElementById('btn-play-icon').src = "https://cdn-icons-png.flaticon.com/512/175/175680.png";
                }
            },

            showDetails: function() {
                if(!this.currentRadio) return;
                document.getElementById('m-img').src = this.currentRadio.favicon || '';
                document.getElementById('m-title').innerText = this.currentRadio.name;
                document.getElementById('m-loc').innerText = this.currentRadio.country;
                document.getElementById('details-modal').style.display = 'flex';
            },

            closeDetails: function() { document.getElementById('details-modal').style.display = 'none'; },

            init: function() {
                this.fetchRadios("country=Brazil&order=clickcount", "top-carousel");
                this.fetchRadios("tag=forro", "forro-carousel");
                this.fetchRadios("tag=sertanejo", "sertanejo-carousel");
            }
        };
        app.init();
    </script>
</body>
</html>
