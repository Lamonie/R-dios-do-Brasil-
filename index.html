<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lamonie Radio PRO</title>
    <style>
        :root { --bg: #000; --accent: #ff2d55; --glass: rgba(25, 25, 25, 0.9); --border: 0.5px solid #333; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: white; padding-bottom: 150px; }

        /* HEADER E BUSCA */
        header { padding: 50px 20px 10px; }
        #search-box { 
            margin: 10px 20px; display: none;
            background: #1c1c1e; border: var(--border);
            padding: 12px; border-radius: 12px; width: calc(100% - 40px);
            color: white; font-size: 16px;
        }

        /* GRID DE RÁDIOS */
        .section-header { padding: 20px; color: #007AFF; font-weight: 700; text-transform: uppercase; font-size: 13px; }
        .carousel { display: flex; overflow-x: auto; gap: 15px; padding: 0 20px 20px; scroll-behavior: smooth; }
        .carousel::-webkit-scrollbar { display: none; }

        .radio-card { min-width: 140px; position: relative; }
        .thumb { width: 140px; height: 140px; border-radius: 15px; background: #1a1a1a; overflow: hidden; border: var(--border); }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }
        .fav-star { 
            position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.6);
            width: 30px; height: 30px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-size: 18px; z-index: 5;
        }

        /* TELA DE DETALHES (PÁGINA QUE ABRE AO CLICAR) */
        #details-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 5000; display: none;
            flex-direction: column; align-items: center; padding: 60px 30px;
        }
        .big-thumb { width: 280px; height: 280px; border-radius: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .details-info { text-align: center; margin-top: 30px; width: 100%; }
        .details-info h2 { font-size: 24px; margin-bottom: 5px; }
        .details-info p { color: #888; margin-bottom: 40px; }

        /* CONTROLES NA PÁGINA DE DETALHES */
        .page-controls { display: flex; align-items: center; gap: 40px; font-size: 45px; }

        /* BARRA INFERIOR (TAB BAR) */
        .tab-bar-container {
            position: fixed; bottom: 25px; left: 0; width: 100%;
            display: flex; justify-content: center; gap: 10px; padding: 0 15px; z-index: 4000;
        }
        .main-nav { 
            background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: 35px; border: var(--border); height: 65px; flex: 1;
            display: flex; align-items: center; justify-content: space-around;
        }
        .nav-item { text-align: center; font-size: 10px; color: #888; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        .search-circle { 
            width: 65px; height: 65px; background: var(--glass); 
            border-radius: 50%; border: var(--border); display: flex;
            align-items: center; justify-content: center; font-size: 24px;
        }
    </style>
</head>
<body>

    <header id="header-main"><h1>Rádios</h1></header>
    <input type="text" id="search-box" placeholder="Buscar rádio no Brasil..." oninput="app.search(this.value)">

    <div id="main-content">
        <div class="section-header">Rádios do Brasil</div>
        <div id="grid-brasil" class="carousel"></div>
        
        <div class="section-header">Sua Biblioteca</div>
        <div id="grid-favs" class="carousel"></div>
    </div>

    <div id="details-page">
        <div onclick="app.closeDetails()" style="position:absolute; top:20px; left:20px; font-size:20px;">✕ Fechar</div>
        <img id="det-img" class="big-thumb">
        <div class="details-info">
            <h2 id="det-title">Nome da Rádio</h2>
            <p id="det-desc">Descrição da rádio...</p>
            <div class="page-controls">
                <span onclick="app.toggle()">⏯️</span>
            </div>
        </div>
    </div>

    <div class="tab-bar-container">
        <nav class="main-nav">
            <div class="nav-item active" onclick="app.showHome()"><div>🏠</div>Início</div>
            <div class="nav-item" onclick="app.showFavs()"><div>📋</div>Biblioteca</div>
        </nav>
        <div class="search-circle" onclick="app.toggleSearch()">🔍</div>
    </div>

    <audio id="player"></audio>

    <script>
        const app = {
            db: JSON.parse(localStorage.getItem('favs_bibiu')) || [],
            allRadios: [],
            
            init: async () => {
                const res = await fetch('https://de1.api.radio-browser.info/json/stations/search?country=Brazil&limit=100&hidebroken=true&order=clickcount&reverse=true');
                app.allRadios = await res.json();
                app.render(app.allRadios, 'grid-brasil');
                app.renderFavs();
            },

            render: (list, containerId) => {
                const cont = document.getElementById(containerId);
                cont.innerHTML = '';
                list.forEach(r => {
                    const isFav = app.db.find(f => f.changeuuid === r.changeuuid);
                    const div = document.createElement('div');
                    div.className = 'radio-card';
                    div.innerHTML = `
                        <div class="fav-star" onclick="event.stopPropagation(); app.toggleFav('${r.changeuuid}')">${isFav?'⭐':'☆'}</div>
                        <div class="thumb" onclick="app.openDetails('${r.changeuuid}')">
                            <img src="${r.favicon || 'https://via.placeholder.com/150/1c1c1e/orange?text=RADIO'}">
                        </div>
                        <div style="font-size:12px; margin-top:5px; font-weight:600; text-align:center">${r.name}</div>
                    `;
                    cont.appendChild(div);
                });
            },

            openDetails: (id) => {
                const r = app.allRadios.find(x => x.changeuuid === id) || app.db.find(x => x.changeuuid === id);
                document.getElementById('det-img').src = r.favicon || '';
                document.getElementById('det-title').innerText = r.name;
                document.getElementById('det-desc').innerText = `Local: ${r.state || 'Brasil'} | Bitrate: ${r.bitrate}kbps`;
                document.getElementById('player').src = r.url_resolved;
                document.getElementById('player').play();
                document.getElementById('details-page').style.display = 'flex';
            },

            closeDetails: () => document.getElementById('details-page').style.display = 'none',
            
            toggle: () => {
                const p = document.getElementById('player');
                p.paused ? p.play() : p.pause();
            },

            toggleFav: (id) => {
                const radio = app.allRadios.find(x => x.changeuuid === id) || app.db.find(x => x.changeuuid === id);
                const idx = app.db.findIndex(x => x.changeuuid === id);
                if(idx > -1) app.db.splice(idx, 1);
                else app.db.push(radio);
                localStorage.setItem('favs_bibiu', JSON.stringify(app.db));
                app.render(app.allRadios, 'grid-brasil');
                app.renderFavs();
            },

            renderFavs: () => app.render(app.db, 'grid-favs'),

            toggleSearch: () => {
                const s = document.getElementById('search-box');
                s.style.display = s.style.display === 'block' ? 'none' : 'block';
                s.focus();
            },

            search: (val) => {
                const filtered = app.allRadios.filter(r => r.name.toLowerCase().includes(val.toLowerCase()));
                app.render(filtered, 'grid-brasil');
            },

            showFavs: () => {
                window.scrollTo({top: document.getElementById('grid-favs').offsetTop - 100, behavior: 'smooth'});
            },

            showHome: () => window.scrollTo({top: 0, behavior: 'smooth'})
        };
        app.init();
    </script>
</body>
</html>
