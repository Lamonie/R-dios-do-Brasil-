<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rádios PRO</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:-apple-system;
}

/* HEADER */
header{
padding:20px;
text-align:center;
font-size:22px;
font-weight:bold;
}

/* SEÇÃO */
.section{
margin-top:10px;
}

.section h2{
color:#0A84FF;
font-size:14px;
padding:10px 15px;
}

/* CARROSSEL */
.carousel{
display:flex;
overflow-x:auto;
gap:15px;
padding:10px 15px;
}

.carousel::-webkit-scrollbar{display:none}

/* CARD */
.card{
min-width:110px;
text-align:center;
cursor:pointer;
}

.thumb{
width:110px;
height:110px;
border-radius:20px;
overflow:hidden;
background:#222;
}

.thumb img{
width:100%;
height:100%;
object-fit:cover;
}

.card span{
font-size:12px;
color:#ccc;
margin-top:5px;
display:block;
}

/* PLAYER */
.player{
position:fixed;
bottom:70px;
left:10px;
right:10px;
background:#111;
border-radius:20px;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
background:#0A84FF;
border:none;
color:#fff;
padding:10px;
border-radius:50%;
}

/* TAB BAR */
.tab{
position:fixed;
bottom:0;
width:100%;
height:70px;
background:#111;
display:flex;
justify-content:space-around;
align-items:center;
}

.tab div{
font-size:11px;
color:#aaa;
text-align:center;
}

.active{
color:#0A84FF;
}
</style>
</head>

<body>

<header>Rádios</header>

<div id="app"></div>

<!-- PLAYER -->
<div class="player">
<span id="status">Parado</span>
<button onclick="play()">▶️</button>
</div>

<!-- TAB -->
<div class="tab">
<div class="active">📻<br>Rádios</div>
<div>⚽<br>Esportes</div>
<div>⭐<br>Favoritos</div>
<div>🔍<br>Buscar</div>
<div>•••<br>Mais</div>
</div>

<audio id="audio"></audio>

<script>

const categorias = [
{nome:"DANCE", filtro:"tag=dance"},
{nome:"FORRÓ", filtro:"tag=forro"},
{nome:"GOSPEL", filtro:"tag=gospel"},
{nome:"HITS", filtro:"order=clickcount"}
];

let current = "";

async function carregar(){
const app = document.getElementById("app");

for(let cat of categorias){

const div = document.createElement("div");
div.className="section";

div.innerHTML = `<h2>${cat.nome} Sugeridas</h2><div class="carousel" id="${cat.nome}"></div>`;
app.appendChild(div);

const res = await fetch(`https://de1.api.radio-browser.info/json/stations/search?${cat.filtro}&limit=20&hidebroken=true`);
const data = await res.json();

const car = div.querySelector(".carousel");

data.forEach(r=>{
if(!r.url_resolved.startsWith("http")) return;

const el = document.createElement("div");
el.className="card";

el.innerHTML=`
<div class="thumb">
<img src="${r.favicon || 'https://via.placeholder.com/100'}">
</div>
<span>${r.name}</span>
`;

el.onclick = ()=>{
current = r.url_resolved;
document.getElementById("status").innerText = r.name;
};

car.appendChild(el);
});
}
}

function play(){
const audio = document.getElementById("audio");

if(!current){
alert("Escolha uma rádio");
return;
}

audio.src = current;

audio.play()
.then(()=>document.getElementById("status").innerText="Tocando...")
.catch(()=>document.getElementById("status").innerText="Erro ao tocar");
}

carregar();

</script>

</body>
</html>
