<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lamoniê Flow - Premium v2.1</title>
    <style>
        :root { 
            --bg: #000; 
            --glass: rgba(25, 25, 25, 0.7); /* Mesma transparência original */
            --border: 0.5px solid #ff8c00; /* Bordas fininhas laranjas que você gosta */
            --accent: #ff2d55; 
            --blur: blur(20px);
        }
        
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: white; overflow-x: hidden; padding-bottom: 150px; }

        /* HEADER E BUSCA */
        header { padding: 60px 20px 20px; font-size: 28px; font-weight: 800; }
        #search-box { 
            display: none; width: calc(100% - 40px); margin: 10px 20px;
            background: #1c1c1e; border: var(--border); padding: 12px; border-radius: 12px;
            color: white; font-size: 16px;
        }

        /* GRID (2 COLUNAS LISO) */
        .radio-container { padding: 15px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .card { 
            background: #111; border-radius: 18px; overflow: hidden; position: relative; 
            border: 0.5px solid #333; transition: transform 0.1s;
        }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .fav-star { 
            position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.6); 
            width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; z-index: 5;
        }

        /* BARRA INFERIOR (GLASS ORIGINAL COM BIBLIOTECA) */
        .original-tab-bar {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; height: 75px;
            background: var(--glass); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            border-radius: 40px; border: var(--border);
            display: flex; align-items: center; justify-content: space-around;
            padding: 0 10px; z-index: 2000;
        }
        .nav-control { display: flex; justify-content: space-around; align-items: center; flex: 1; gap: 10px; }
        .tab-item { text-align: center; color: #777; font-size: 10px; font-weight: 500; cursor: pointer; flex: 1;}
        .tab-item.active { color: #ff8c00; }
        .tab-icon { font-size: 20px; margin-bottom: 5px; color: white;}

        /* MINI PLAYER SOBRE O VIDRO */
        #mini-player {
            position: fixed; bottom: 110px; left: 20px; right: 20px;
            height: 65px; background: var(--glass); backdrop-filter: var(--blur);
            border-radius: 15px; border: var(--border);
            display: none; align-items: center; justify-content: space-between; padding: 0 15px;
            z-index: 1000; box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <header>Rádios</header>
    <input type="text" id="search-box" placeholder="Qual rádio de Jaíbaras vamos ouvir?" oninput="app.search(this.value)">

    <div class="radio-container" id="radio-grid">
        </div>

    <div id="mini-player">
        <div style="display:flex; align-items:center; gap:10px;">
            <img id="m-art" style="width:40px;height:40px;border-radius:5px;background:#333">
            <div id="m-title" style="font-size:12px;font-weight:600">Nenhuma rádio...</div>
        </div>
        <div style="display:flex;gap:15px;font-size:18px;">
            <span onclick="app.togglePlay()">⏯️</span>
            <span>⏭️</span>
        </div>
    </div>

    <nav class="original-tab-bar">
        <div class="nav-control">
            <div class="tab-item active"><div>🏠</div><span>Início</span></div>
            <div class="tab-item"><div>📻</div><span>Rádio</span></div>
            <div class="tab-item" style="color:var(--accent)"><div>📋</div><span>Biblioteca</span></div>
        </div>
        <div onclick="app.toggleSearch()" style="width:55px; height:55px; border-radius:50%; background:rgba(255,140,0,0.2); border:0.5px solid #ff8c00; display:flex; align-items:center; justify-content:center; font-size:22px;">🔍</div>
    </nav>

    <audio id="player"></audio>

    <script>
        const app = {
            db: [],
            init: async () => {
                const res = await fetch('https://de1.api.radio-browser.info/json/stations/search?country=Brazil&tag=forro,nordeste,brega&limit=60&hidebroken=true&order=clickcount&reverse=true');
                app.db = await res.json();
                app.renderGrid(app.db);
            },
            renderGrid: (list) => {
                const grid = document.getElementById('radio-grid');
                grid.innerHTML = '';
                list.forEach(r => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => app.play(r);
                    card.innerHTML = `
                        <div class="fav-star">☆</div>
                        <img src="${r.favicon || 'https://via.placeholder.com/150/111/white?text=RADIO'}">
                    `;
                    grid.appendChild(card);
                });
            },
            play: (r) => {
                const p = document.getElementById('player');
                const mini = document.getElementById('mini-player');
                p.src = r.url_resolved;
                p.play();
                document.getElementById('m-art').src = r.favicon;
                document.getElementById('m-title').innerText = r.name;
                mini.style.display = 'flex';
            },
            togglePlay: () => {
                const p = document.getElementById('player');
                p.paused ? p.play() : p.pause();
            },
            toggleSearch: () => {
                const s = document.getElementById('search-box');
                s.style.display = s.style.display === 'block' ? 'none' : 'block';
                s.focus();
            },
            search: (val) => {
                const filtered = app.db.filter(r => r.name.toLowerCase().includes(val.toLowerCase()));
                app.renderGrid(filtered);
            }
        };
        app.init();
    </script>
</body>
</html>
